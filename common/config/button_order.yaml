# =============================================================================
# CONFIG: BUTTON ORDER
# =============================================================================
# Comma-separated list of slot numbers defining the grid layout. Suffix "d"
# marks a double-height button, suffix "w" marks a double-wide button,
# suffix "b" marks a 2×2 (big) button, suffix "t" marks a 3×1 extra-tall
# button, suffix "x" marks a 1×3 extra-wide button, suffix "h" marks a 3×2
# max-wide button, and suffix "v" marks a 2×3 max-tall button. Managed by the
# web UI editor.
# =============================================================================

text:
  - platform: template
    name: "${entity_button_order}"
    internal: true
    id: button_order
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 120
    mode: text
    entity_category: config
    icon: "mdi:order-numeric-ascending"
    update_interval: never
    web_server:
      sorting_group_id: sg_button
    on_value:
      then:
        - delay: 750ms
        - script.execute: refresh_button_grid
