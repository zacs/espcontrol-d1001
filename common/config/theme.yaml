# =============================================================================
# CONFIG: SCREEN THEME
# =============================================================================
# E-paper displays use a simple light/dark theme selector to flip between
# black-on-white and white-on-black button colours.
# =============================================================================

substitutions:
  screen_theme_initial_option: "Light"
  screen_theme_dark_button_on_color: "FFFFFF"
  screen_theme_light_button_on_color: "000000"

select:
  - platform: template
    name: "${entity_screen_theme}"
    internal: true
    id: screen_theme
    entity_category: config
    icon: "mdi:theme-light-dark"
    optimistic: true
    restore_value: true
    initial_option: "${screen_theme_initial_option}"
    options:
      - "Light"
      - "Dark"
    web_server:
      sorting_group_id: sg_display
    set_action:
      - lambda: |-
          if (x == "Dark") {
            id(button_on_color).publish_state("${screen_theme_dark_button_on_color}");
          } else {
            id(button_on_color).publish_state("${screen_theme_light_button_on_color}");
          }
      - script.execute: refresh_button_grid
