    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(cover_art_screensaver_active);'
            then:
              - script.execute: cover_art_show_track_overlay

  # Legacy setting kept so existing panels can migrate their saved single
  # clock brightness into the new day/night settings, and so older cached web
  # UIs still change the live screensaver brightness after startup.
  - platform: template
    name: "${entity_screen_saver_clock_brightness}"
    internal: true
    id: clock_brightness
    min_value: ${screen_saver_clock_min_brightness}
    max_value: 100
    step: 1
    initial_value: ${screen_saver_clock_default_brightness}
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    on_value:
      then:
        - lambda: |-
            if (!id(clock_brightness_legacy_sync_ready)) return;
            auto clamp_clock_pct = [](float pct, float fallback) -> float {
              if (std::isnan(pct) || pct <= 0.0f) pct = fallback;
              if (pct < ${screen_saver_clock_min_brightness}.0f) {
                pct = ${screen_saver_clock_min_brightness}.0f;
              }
              if (pct > 100.0f) pct = 100.0f;
              return pct;
            };
            float legacy_pct = clamp_clock_pct(
              id(clock_brightness).state, ${screen_saver_clock_default_brightness}.0f);
            float previous_pct = clamp_clock_pct(
              id(clock_brightness_legacy_last_level), legacy_pct);
            if (legacy_pct == previous_pct) return;
            id(clock_brightness_legacy_last_level) = legacy_pct;

            auto day_call = id(clock_brightness_day).make_call();
            day_call.set_value(legacy_pct);
            day_call.perform();

            auto night_call = id(clock_brightness_night).make_call();
            night_call.set_value(legacy_pct);
            night_call.perform();
            global_preferences->sync();

  # Screensaver idle timeout
  - platform: template
    name: "${entity_screensaver_timeout}"
    internal: true
    id: screensaver_timeout
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Home screen return timeout (0 = disabled)
  - platform: template
