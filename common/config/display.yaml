# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

globals:
  - id: screen_rotation_ready
    type: bool
    restore_value: no
    initial_value: 'false'

esphome:
  on_boot:
    # Apply restored clock-bar visibility before subpages copy main-page padding.
    - priority: -150
      then:
        - lambda: |-
            std::vector<std::string> restored_clock_bar_temperature_entities =
                parse_clock_bar_temperature_entities(id(clock_bar_temperature_entities).state);
            if (restored_clock_bar_temperature_entities.empty()) {
              std::string legacy_clock_bar_temperature_entity;
              if (id(outdoor_temp_enable).state && !id(outdoor_temp_entity).state.empty()) {
                legacy_clock_bar_temperature_entity = id(outdoor_temp_entity).state;
              } else if (id(indoor_temp_enable).state && !id(indoor_temp_entity).state.empty()) {
                legacy_clock_bar_temperature_entity = id(indoor_temp_entity).state;
              }
              if (!legacy_clock_bar_temperature_entity.empty()) {
                id(clock_bar_temperature_entities).publish_state(legacy_clock_bar_temperature_entity);
                id(outdoor_temp_enable).turn_on();
                id(indoor_temp_enable).turn_off();
              }
            }
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
            set_display_temperature_degree_symbol(id(temperature_degree_symbol_enabled).state);
        - script.execute: clock_bar_hide
        - script.execute: clock_bar_apply

script:
  - id: clock_bar_hide
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *temperature_labels[] = {
            id(temperatures),
          };
          hide_clock_bar_top_layer_widgets(temperature_labels, 1,
                                           id(display_time),
                                           id(network_status_button));
          ${voice_clock_bar_hide_code}
          network_status_hide_modal();

  - id: clock_bar_apply
    mode: restart
    then:
      - lambda: |-
          ClockBarVisibility visibility = clock_bar_resolve_visibility(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active));
          bool reserve_clock_bar_space = visibility.reserve_space;
          bool visible = visibility.visible;
          bool show_time = visible && id(clock_bar_time_enabled).state;
          bool show_network = visible && id(network_status_enabled).state;
          int clock_bar_screen_width = clock_bar_current_screen_width(${screen_width});
          int clock_bar_screen_height = clock_bar_current_screen_height(${screen_height});
          bool clock_bar_480_square =
              clock_bar_screen_width == 480 && clock_bar_screen_height == 480;
          bool clock_bar_device_480_square =
              ${screen_width} == 480 && ${screen_height} == 480;
          int clock_bar_label_y = ${main_page_pad_top} / 5;
          int clock_bar_icon_y =
              (${main_page_pad_top} - lv_obj_get_height(id(network_status_button))) / 2;
          if (clock_bar_icon_y < 0) clock_bar_icon_y = 0;
          int clock_bar_item_width = ${clock_bar_item_gap};
          int clock_bar_right_x =
              clock_bar_480_square ? 4 : (clock_bar_screen_width >= 700 ? 8 : 6);
          lv_obj_t *temperature_labels[] = {
            id(temperatures),
          };
          set_clock_bar_temperature_labels(temperature_labels, 1);
          clock_bar_set_button_grid_pages_pad_top(
            id(main_page)->obj,
            reserve_clock_bar_space ? ${main_page_pad_top} : ${main_page_compact_pad_top});

          if (!visible) {
            hide_clock_bar_top_layer_widgets(temperature_labels, 1,
                                             id(display_time),
                                             id(network_status_button));
            ${voice_clock_bar_hide_code}
            network_status_hide_modal();
            return;
          }

          apply_clock_bar_fixed_layout(
              id(temperatures),
              id(display_time),
              id(network_status_button),
              visible && (id(indoor_temp_enable).state || id(outdoor_temp_enable).state),
              show_time,
              show_network,
              clock_bar_screen_width >= 700 ? 8 : 6,
              clock_bar_label_y,
              clock_bar_right_x,
              clock_bar_icon_y,
              ${clock_bar_item_gap});

          if (show_time) {
            lv_obj_clear_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
          }
          if (show_network) {
            lv_obj_clear_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            id(network_status_refresh).execute();
          } else {
            lv_obj_add_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            network_status_hide_modal();
          }
          ${voice_clock_bar_apply_code}
          if (!visible) return;

          refresh_clock_bar_temperature_label_values(id(main_page)->obj,
                                    visible &&
                                      !id(display_asleep) &&
                                      !id(screen_schedule_asleep),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

switch:
  - platform: template
    name: "${entity_screen_clock_bar}"
    internal: true
    id: clock_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:clock-digital"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
      - delay: 50ms
      - script.execute: refresh_button_grid
    on_turn_off:
      - script.execute: clock_bar_apply
      - delay: 50ms
      - script.execute: refresh_button_grid

  - platform: template
    name: "${entity_screen_network_status_icon}"
    internal: true
    id: network_status_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:wifi"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_screen_clock_bar_time}"
    internal: true
    id: clock_bar_time_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:clock-time-four-outline"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_indoor_temp_enable}"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
      - lambda: |-
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - script.execute: clock_bar_apply
      - lambda: |-
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_outdoor_temp_enable}"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
      - lambda: |-
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - script.execute: clock_bar_apply
      - lambda: |-
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_screen_temperature_degree_symbol}"
    internal: true
    id: temperature_degree_symbol_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:temperature-celsius"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          set_display_temperature_degree_symbol(true);
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          set_display_temperature_degree_symbol(false);
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_asleep),
              id(screen_schedule_asleep),
              id(is_clock_showing),
              id(cover_art_screensaver_active),
              id(screensaver_display_off_active),
              id(screensaver_dimmed_active)),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_screen_subpage_chevron}"
    internal: true
    id: subpage_chevrons_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:chevron-right"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: refresh_button_grid
    on_turn_off:
      - script.execute: refresh_button_grid

  - platform: template
    name: "${entity_screen_saver_clock}"
    internal: true
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:clock-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(screensaver_action_clock);'
          then:
            - select.set:
                id: screensaver_action
                option: "Clock"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return id(screensaver_action_clock);'
          then:
            - select.set:
                id: screensaver_action
                option: "Display Off"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_media_player_sleep_prevention}"
    internal: true
    id: media_player_sleep_prevention_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:speaker-play"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_cover_art}"
    internal: true
    id: cover_art_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:image-album"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - script.execute: cover_art_resubscribe
      - script.execute: cover_art_playback_refresh
    on_turn_off:
      - script.execute: cover_art_disable

  - platform: template
    name: "${entity_screen_saver_hide_cover_art_external_input}"
    internal: true
    id: cover_art_hide_external_input_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:television-classic"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - script.execute: cover_art_apply_external_input_policy
    on_turn_off:
      - script.execute: cover_art_apply_external_input_policy

select:
  - platform: template
    name: "${entity_screen_saver_action}"
    internal: true
    id: screensaver_action
    entity_category: config
    icon: "mdi:monitor-shimmer"
    optimistic: true
    restore_value: true
    initial_option: "Display Off"
    options:
      - "Display Off"
      - "Screen Dimmed"
      - "Clock"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - lambda: |-
            std::string action = id(screensaver_action).current_option();
            id(screensaver_action_clock) = screensaver_action_clock_mode(action);
            id(screensaver_action_dimmed) = screensaver_action_dimmed_mode(action);
        - if:
            condition:
              lambda: |-
                return id(screensaver_action_clock) && !id(clock_screensaver_enabled).state;
            then:
              - switch.turn_on: clock_screensaver_enabled
        - if:
            condition:
              lambda: |-
                return !id(screensaver_action_clock) && id(clock_screensaver_enabled).state;
            then:
              - switch.turn_off: clock_screensaver_enabled
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_temperature_unit}"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
            refresh_temperature_unit_labels();
            refresh_clock_bar_temperature_label_values(
              id(main_page)->obj,
              clock_bar_should_show(
                id(clock_bar_enabled).state,
                id(main_page)->obj,
                id(display_asleep),
                id(screen_schedule_asleep),
                id(is_clock_showing),
                id(cover_art_screensaver_active),
                id(screensaver_display_off_active),
                id(screensaver_dimmed_active)),
              id(indoor_temp_enable).state,
              id(outdoor_temp_enable).state,
              id(indoor_temp), id(outdoor_temp));

text:
  - platform: template
    name: "${entity_clock_bar_temperature_entities}"
    internal: true
    id: clock_bar_temperature_entities
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 240
    mode: text
    entity_category: config
    icon: "mdi:thermometer-lines"
    update_interval: never
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            lv_obj_t *temperature_labels[] = {
              id(temperatures),
            };
            configure_clock_bar_temperature_entities(
              id(clock_bar_temperature_entities).state,
              temperature_labels,
              1,
              id(main_page)->obj,
              []() {
                return clock_bar_should_show(
                    id(clock_bar_enabled).state,
                    id(main_page)->obj,
                    id(display_asleep),
                    id(screen_schedule_asleep),
                    id(is_clock_showing),
                    id(cover_art_screensaver_active),
                    id(screensaver_display_off_active),
                    id(screensaver_dimmed_active));
              },
              []() {
                return id(outdoor_temp_enable).state;
              });
        - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_indoor_temp_entity}"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_outdoor_temp_entity}"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Screensaver Mode"
    internal: true
    id: screensaver_mode
    optimistic: true
    restore_value: true
    initial_value: "disabled"
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:timer-cog-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "${entity_presence_sensor_entity}"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

  # Optional media player that keeps the screensaver awake while playing.
  - platform: template
    name: "${entity_media_player_sleep_prevention_entity}"
    internal: true
    id: media_player_sleep_prevention_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:speaker-play"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_cover_art_entity}"
    internal: true
    id: cover_art_media_player_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:speaker-play"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - globals.set:
            id: cover_art_subscribed_entity
            value: '""'
