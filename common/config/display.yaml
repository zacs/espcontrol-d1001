            value: '""'
        - script.execute: cover_art_playback_stopped
        - script.execute: cover_art_resubscribe

number:
  - platform: template
    name: "${entity_screen_saver_daytime_clock_brightness}"
    internal: true
    id: clock_brightness_day
    min_value: ${screen_saver_clock_min_brightness}
    max_value: 100
    step: 1
    initial_value: ${screen_saver_clock_default_brightness}
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - lambda: 'global_preferences->sync();'
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_nighttime_clock_brightness}"
    internal: true
    id: clock_brightness_night
    min_value: ${screen_saver_clock_min_brightness}
    max_value: 100
    step: 1
    initial_value: ${screen_saver_clock_default_brightness}
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - lambda: 'global_preferences->sync();'
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_dimmed_brightness}"
    internal: true
    id: screensaver_dimmed_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screensaver_dimmed_active);'
            then:
              - script.execute: screensaver_dimmed_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_cover_art_delay}"
    internal: true
    id: cover_art_delay
    min_value: 0
    max_value: 300
