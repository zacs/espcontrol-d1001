# =============================================================================
# WEB SERVER AUTHENTICATION - Optional manual ESPHome install package
# =============================================================================
# Include this package from a manual ESPHome YAML to protect EspControl's
# built-in web page with credentials supplied by the user's substitutions.
# =============================================================================

substitutions:
  espcontrol_web_username: ""
  espcontrol_web_password: ""

web_server:
  auth:
    type: digest
    username: ${espcontrol_web_username}
    password: ${espcontrol_web_password}
