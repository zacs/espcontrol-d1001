# =============================================================================
# TIME - NTP/Home Assistant time sources and timezone selector
# =============================================================================
# SNTP drives the on-screen clock when network NTP is available. Home Assistant
# time remains enabled as a fallback. The timezone selector provides approximate
# lat/lon for on-device sunrise/sunset calculation (sun_calc.h).
# =============================================================================

globals:
  - id: clock_format_12h
    type: bool
    initial_value: 'false'

esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(clock_format_12h) = id(clock_format_select).current_option() == "12h";
          std::string timezone_option = id(timezone_select).current_option();
          const char *posix = apply_configured_timezone(timezone_option);
          set_espcontrol_language(id(language_select).current_option());
          if (posix != nullptr) {
            id(panel_time).set_timezone(posix);
            id(homeassistant_time).set_timezone(posix);
          }
          set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                       timezone_option);
          id(screen_active_timezone_sensor).publish_state(effective_timezone_option(timezone_option));
      - script.execute: network_setup_text_refresh
      - script.execute: ha_setup_text_refresh
      - script.execute: ha_actions_text_refresh
      - script.execute: button_setup_text_refresh

# Ask Home Assistant for time once the native API has finished state setup. This
# keeps the HA time source as a fallback without adding traffic during the
# fragile reconnect window.
api:
  on_client_connected:
    - delay: 2s
    - lambda: |-
        if (ha_api_state_connected()) id(homeassistant_time).update();
    - script.execute: timezone_after_homeassistant_time_sync
    - script.execute: backlight_recalc_sunrise_sunset
    - script.execute: screen_schedule_check

