# ---------------------------------------------------------------------------
# NTP server settings and date source for Date cards
# ---------------------------------------------------------------------------
text:
  - platform: template
    name: "${entity_screen_ntp_server_1}"
    internal: true
    id: ntp_server_1
    optimistic: true
    restore_value: true
    initial_value: "0.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply_after_network

  - platform: template
    name: "${entity_screen_ntp_server_2}"
    internal: true
    id: ntp_server_2
    optimistic: true
    restore_value: true
    initial_value: "1.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply_after_network

  - platform: template
    name: "${entity_screen_ntp_server_3}"
    internal: true
    id: ntp_server_3
    optimistic: true
    restore_value: true
    initial_value: "2.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply_after_network

text_sensor:
  # Diagnostic value published from the active time source. This makes
  # the date visible as an ESPHome state and gives Date cards a clear source.
  - platform: template
    name: "Screen: Date"
    id: screen_date_sensor
    entity_category: diagnostic
    icon: "mdi:calendar"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness

  - platform: template
    name: "${entity_screen_active_timezone}"
    id: screen_active_timezone_sensor
    entity_category: diagnostic
    icon: "mdi:map-clock-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness

  # Optional direct Home Assistant Date & Time integration source. When
  # Home Assistant has sensor.date, use it immediately; otherwise the active
  # panel time source below remains the fallback.
  - platform: homeassistant
    id: homeassistant_date_sensor
    entity_id: sensor.date
    internal: true
    on_value:
      then:
        - lambda: |-
            if (update_calendar_cards_from_date_text(x)) {
              id(screen_date_sensor).publish_state(x);
            }

# ---------------------------------------------------------------------------
# SNTP primary time source and Home Assistant fallback. SNTP sync refreshes
# sunrise/sunset; Home Assistant sync only refreshes the clock/schedule.
# ---------------------------------------------------------------------------
time:
  - platform: sntp
    id: panel_time
    servers:
      - "0.pool.ntp.org"
      - "1.pool.ntp.org"
      - "2.pool.ntp.org"
    on_time_sync:
      - script.execute: time_update
      - script.execute: backlight_recalc_sunrise_sunset
      - script.execute: screen_schedule_check
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

  - platform: homeassistant
    id: homeassistant_time
    update_interval: 1min
    on_time_sync:
      - script.execute: timezone_after_homeassistant_time_sync
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: ntp_servers_apply_after_network
    mode: restart
    then:
      - delay: 2s
      - script.execute: ntp_servers_apply

  - id: ntp_servers_apply
    mode: restart
    then:
      - lambda: |-
          apply_ntp_servers(id(ntp_server_1).state,
                            id(ntp_server_2).state,
                            id(ntp_server_3).state);

  - id: timezone_after_homeassistant_time_sync
    mode: restart
    then:
      - delay: 1200ms
      - lambda: |-
          std::string timezone_option = id(timezone_select).current_option();
          const char *posix = apply_configured_timezone(timezone_option);
          if (posix != nullptr) {
            id(panel_time).set_timezone(posix);
            id(homeassistant_time).set_timezone(posix);
          }
          set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                       timezone_option);
          std::string active_timezone = effective_timezone_option(timezone_option);
          id(screen_active_timezone_sensor).publish_state(active_timezone);
          ESP_LOGI("timezone", "Configured timezone: %s; active timezone: %s",
                   timezone_option.c_str(), active_timezone.c_str());
          refresh_temperature_unit_labels();
          refresh_clock_bar_temperature_label_values(
            id(main_page)->obj,
            clock_bar_should_show(
              id(clock_bar_enabled).state,
              id(main_page)->obj,
              id(display_mode_controller).current_mode(),
              id(display_mode_controller).target_schedule_inactive()),
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp), id(outdoor_temp));
      - script.execute: time_update
      - script.execute: backlight_recalc_sunrise_sunset
      - script.execute: screen_schedule_check

  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[8];
            auto now = panel_time_or_fallback(id(panel_time).now(),
                                              id(homeassistant_time).now());
            if (!now.is_valid()) return "--:--";
            bool use_12h = id(clock_format_12h);
            format_clock_time_without_suffix(time_buf, sizeof(time_buf),
                                             now.hour, now.minute, use_12h);
            return time_buf;
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(),
                                            id(homeassistant_time).now());
          bool use_12h = id(clock_format_12h);
          if (now.is_valid()) {
            static char date_buf[11];
            snprintf(date_buf, sizeof(date_buf), "%04d-%02d-%02d",
                     now.year, now.month, now.day_of_month);
            id(screen_date_sensor).publish_state(date_buf);
            update_calendar_cards(true, now.day_of_month, now.month);
            update_calendar_cards_time(
                true, now.day_of_month, now.month, now.hour, now.minute, use_12h);
            update_timezone_cards(true, now.timestamp,
                                  id(timezone_select).current_option(), use_12h);
          } else if (!calendar_date_valid()) {
            if (ha_api_state_connected()) id(homeassistant_time).update();
            id(screen_date_sensor).publish_state("");
            update_calendar_cards(false, 0, 0);
            update_calendar_cards_time(false, 0, 0, 0, 0, false);
            update_timezone_cards(false, 0, id(timezone_select).current_option(), use_12h);
          } else {
            if (ha_api_state_connected()) id(homeassistant_time).update();
            update_calendar_cards_time(false, 0, 0, 0, 0, false);
            update_timezone_cards(false, 0, id(timezone_select).current_option(), use_12h);
          }
