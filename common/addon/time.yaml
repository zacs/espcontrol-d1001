# ---------------------------------------------------------------------------
# NTP server settings and date source for Date cards
# ---------------------------------------------------------------------------
text:
  - platform: template
    name: "${entity_screen_ntp_server_1}"
    internal: true
    id: ntp_server_1
    optimistic: true
    restore_value: true
    initial_value: "0.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply

  - platform: template
    name: "${entity_screen_ntp_server_2}"
    internal: true
    id: ntp_server_2
    optimistic: true
    restore_value: true
    initial_value: "1.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply

  - platform: template
    name: "${entity_screen_ntp_server_3}"
    internal: true
    id: ntp_server_3
    optimistic: true
    restore_value: true
    initial_value: "2.pool.ntp.org"
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:server-network"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: ntp_servers_apply

  - platform: template
    name: "${entity_screen_month_names}"
    internal: true
    id: calendar_month_names
    optimistic: true
    restore_value: true
    initial_value: "January,February,March,April,May,June,July,August,September,October,November,December"
    min_length: 0
    max_length: 255
    mode: text
    entity_category: config
    icon: "mdi:calendar-text"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - lambda: |-
            set_calendar_month_names(x);

text_sensor:
  # Diagnostic value published from the active time source. This makes
  # the date visible as an ESPHome state and gives Date cards a clear source.
  - platform: template
    name: "Screen: Date"
    id: screen_date_sensor
    entity_category: diagnostic
    icon: "mdi:calendar"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness

  # Optional direct Home Assistant Date & Time integration source. When
  # Home Assistant has sensor.date, use it immediately; otherwise the active
  # panel time source below remains the fallback.
  - platform: homeassistant
    id: homeassistant_date_sensor
    entity_id: sensor.date
    internal: true
    on_value:
      then:
        - lambda: |-
            if (update_calendar_cards_from_date_text(x)) {
              id(screen_date_sensor).publish_state(x);
            }

# ---------------------------------------------------------------------------
# SNTP primary time source and Home Assistant fallback. Sync triggers clock and
# sunrise/sunset recalculation.
# ---------------------------------------------------------------------------
time:
  - platform: sntp
    id: panel_time
    timezone: "UTC0"
    servers:
      - "0.pool.ntp.org"
      - "1.pool.ntp.org"
      - "2.pool.ntp.org"
    on_time_sync:
      - script.execute: time_update
      - script.execute: backlight_recalc_sunrise_sunset
      - script.execute: screen_schedule_check
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

  - platform: homeassistant
    id: homeassistant_time
    timezone: "UTC0"
    update_interval: 1min
    on_time_sync:
      - script.execute: time_update
      - script.execute: backlight_recalc_sunrise_sunset
      - script.execute: screen_schedule_check
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: ntp_servers_apply
    mode: restart
    then:
      - lambda: |-
          apply_ntp_servers(id(ntp_server_1).state,
                            id(ntp_server_2).state,
                            id(ntp_server_3).state);

  - id: time_update
    then:
      - lambda: |-
          const char *posix = apply_timezone(id(timezone_select).current_option());
          id(panel_time).set_timezone(posix);
          id(homeassistant_time).set_timezone(posix);
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = panel_time_or_fallback(id(panel_time).now(),
                                              id(homeassistant_time).now());
            if (!now.is_valid()) return "--:--";
            int h = now.hour;
            int m = now.minute;
            bool use_12h =
                id(clock_format_select).current_option() == "12h";
            if (use_12h) {
              int h12 = h % 12;
              if (h12 == 0) h12 = 12;
              snprintf(time_buf, sizeof(time_buf), "%d:%02d", h12, m);
            } else {
              snprintf(time_buf, sizeof(time_buf), "%02d:%02d", h, m);
            }
            return time_buf;
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(),
                                            id(homeassistant_time).now());
          bool use_12h =
              id(clock_format_select).current_option() == "12h";
          if (now.is_valid()) {
            static char date_buf[11];
            snprintf(date_buf, sizeof(date_buf), "%04d-%02d-%02d",
                     now.year, now.month, now.day_of_month);
            id(screen_date_sensor).publish_state(date_buf);
            update_calendar_cards(true, now.day_of_month, now.month);
            update_calendar_cards_time(
                true, now.day_of_month, now.month, now.hour, now.minute, use_12h);
            update_timezone_cards(true, now.timestamp,
                                  id(timezone_select).current_option(), use_12h);
          } else if (!calendar_date_valid()) {
            if (ha_api_state_connected()) id(homeassistant_time).update();
            id(screen_date_sensor).publish_state("");
            update_calendar_cards(false, 0, 0);
            update_calendar_cards_time(false, 0, 0, 0, 0, false);
            update_timezone_cards(false, 0, id(timezone_select).current_option(), use_12h);
          } else {
            if (ha_api_state_connected()) id(homeassistant_time).update();
            update_calendar_cards_time(false, 0, 0, 0, 0, false);
            update_timezone_cards(false, 0, id(timezone_select).current_option(), use_12h);
          }
