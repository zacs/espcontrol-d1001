# =============================================================================
# BACKLIGHT SCHEDULE - Day/Night Brightness via On-Device Sun Calculation
# =============================================================================
# Automatic day/night brightness using sunrise/sunset times calculated
# on-device from the user's timezone (sun_calc.h). No Home Assistant
# sun entity dependency — works fully standalone.
# =============================================================================

globals:
  - id: last_is_daytime
    type: bool
    initial_value: 'true'
  - id: sunrise_hour
    type: int
    initial_value: '6'
  - id: sunrise_minute
    type: int
    initial_value: '0'
  - id: sunset_hour
    type: int
    initial_value: '18'
  - id: sunset_minute
    type: int
    initial_value: '0'
  - id: sunrise_sunset_valid
    type: bool
    initial_value: 'false'
  - id: schedule_mode_always_on
    type: bool
    initial_value: 'false'
  - id: schedule_mode_clock
    type: bool
    initial_value: 'false'

# =============================================================================
# SUNRISE / SUNSET DISPLAY
# =============================================================================

text_sensor:
  - platform: template
    name: "${entity_screen_sunrise}"
    id: sunrise_time_sensor
    entity_category: diagnostic
    internal: true
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_brightness

  - platform: template
    name: "${entity_screen_sunset}"
    id: sunset_time_sensor
    entity_category: diagnostic
    internal: true
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_brightness

esphome:
  on_boot:
    # Publish the live fail-dark decision before the loading screen's -200
    # handler can decide whether it is safe to light the panel.
    priority: -190
    then:
      - lambda: |-
          std::string mode = id(schedule_mode).current_option();
          id(schedule_mode_always_on) = screen_schedule_always_on_mode(mode);
          id(schedule_mode_clock) = screen_schedule_clock_mode(mode);
      - if:
          condition:
            lambda: 'return id(schedule_enabled).state && screen_schedule_disabled_trigger(id(screen_schedule_trigger).state);'
          then:
            - lambda: |-
                auto call = id(screen_schedule_trigger).make_call();
                call.set_value("time");
                call.perform();
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          const bool waiting_for_time = screen_schedule_waiting_for_time(
              id(screen_schedule_trigger).state, id(schedule_enabled).state, now.is_valid());
          const bool schedule_night = screen_schedule_night_active(
              id(screen_schedule_trigger).state,
              id(schedule_enabled).state,
              id(presence_detected),
              now.is_valid(),
              now.is_valid() ? now.hour : 0,
              (int) id(schedule_on_hour).state,
              (int) id(schedule_off_hour).state,
              id(screen_schedule_sensor_activation).current_option());
      - script.execute: screen_schedule_boot_guard

# =============================================================================
# USER-CONFIGURABLE ENTITIES
# =============================================================================

switch:
  - platform: template
    name: "${entity_screen_automatic_brightness}"
    id: automatic_brightness_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:brightness-auto"
    web_server:
      sorting_group_id: sg_brightness
    on_turn_on:
      - script.execute: backlight_apply_brightness

  - platform: template
    name: "${entity_screen_schedule_enabled}"
    internal: true
    id: schedule_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_brightness
    on_turn_on:
      - if:
          condition:
            lambda: 'return screen_schedule_disabled_trigger(id(screen_schedule_trigger).state);'
          then:
            - lambda: |-
                auto call = id(screen_schedule_trigger).make_call();
                call.set_value("time");
                call.perform();
          else:
            - script.execute: screen_schedule_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !screen_schedule_disabled_trigger(id(screen_schedule_trigger).state);'
          then:
            - lambda: |-
                auto call = id(screen_schedule_trigger).make_call();
                call.set_value("disabled");
                call.perform();
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - if:
          condition:
            lambda: |-
              const auto transition = id(display_mode_controller).resolve();
              return transition.target_mode != espcontrol::DisplayMode::ACTIVE &&
                  (transition.winning_source == espcontrol::DisplayRequestSource::BOOT_GUARD ||
                   transition.winning_source == espcontrol::DisplayRequestSource::SCREEN_SCHEDULE);
          then:
            - script.execute: screen_schedule_wake
          else:
            - script.execute: backlight_apply_brightness

select:
  - platform: template
    name: "${entity_screen_schedule_sensor_activation}"
    internal: true
    id: screen_schedule_sensor_activation
    entity_category: config
    icon: "mdi:toggle-switch-outline"
    optimistic: true
    restore_value: true
    initial_option: "Sensor Off"
    options:
      - "Sensor Off"
      - "Sensor On"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "${entity_screen_schedule_mode}"
    internal: true
    id: schedule_mode
    entity_category: config
    icon: "mdi:theme-light-dark"
    optimistic: true
    restore_value: true
    initial_option: "Screen off"
    options:
      - "Screen off"
      - "Screen Dimmed"
      - "Always On"
      - "Clock"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - lambda: |-
            std::string mode = id(schedule_mode).current_option();
            id(schedule_mode_always_on) = screen_schedule_always_on_mode(mode);
            id(schedule_mode_clock) = screen_schedule_clock_mode(mode);
        - script.execute: screen_schedule_check

text:
  - platform: template
    name: "${entity_screen_schedule_trigger}"
    internal: true
    id: screen_schedule_trigger
    optimistic: true
    restore_value: true
    initial_value: "disabled"
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:calendar-sync"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: 'return screen_schedule_disabled_trigger(id(screen_schedule_trigger).state);'
            then:
              - switch.turn_off: schedule_enabled
            else:
              - switch.turn_on: schedule_enabled
        - script.execute: screen_schedule_check

  - platform: template
    name: "${entity_screen_schedule_clock_text_color}"
    internal: true
    id: schedule_clock_text_color
    optimistic: true
    restore_value: true
    initial_value: "FFFFFF"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:format-color-text"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).current_mode_is(
                    espcontrol::DisplayMode::CLOCK);
            then:
              - lambda: 'apply_clock_screensaver_text_color(id(clock_label), id(schedule_clock_text_color).state);'

  - platform: template
    name: "${entity_screen_brightness_dawn_time}"
    internal: true
    id: brightness_dawn_time
    optimistic: true
    restore_value: true
    initial_value: "06:00"
    min_length: 5
    max_length: 5
    mode: text
    entity_category: config
    icon: "mdi:weather-sunset-up"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "${entity_screen_brightness_dusk_time}"
    internal: true
    id: brightness_dusk_time
    optimistic: true
    restore_value: true
    initial_value: "18:00"
    min_length: 5
    max_length: 5
    mode: text
    entity_category: config
    icon: "mdi:weather-sunset-down"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

number:
  - platform: template
    name: "${entity_screen_schedule_on_hour}"
    internal: true
    id: schedule_on_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "${entity_screen_schedule_off_hour}"
    internal: true
    id: schedule_off_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:weather-night"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "${entity_screen_schedule_wake_timeout}"
    internal: true
    id: schedule_wake_timeout
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: s
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(manual_wake_ms) != 0;'
            then:
              - script.execute: screen_schedule_wake_timeout_check

  - platform: template
    name: "${entity_screen_schedule_wake_brightness}"
    internal: true
    id: schedule_wake_brightness
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 10
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-5"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(manual_wake_ms) != 0;'
            then:
              - script.execute: backlight_apply_brightness

  - platform: template
    name: "${entity_screen_schedule_dimmed_brightness}"
    internal: true
    id: schedule_dimmed_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 10
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                if (!id(display_mode_controller).current_mode_is(
                      espcontrol::DisplayMode::ACTIVE)) return false;
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return screen_schedule_night_active(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         id(presence_detected),
                         now.is_valid(),
                         now.is_valid() ? now.hour : 0,
                         (int) id(schedule_on_hour).state,
                         (int) id(schedule_off_hour).state,
                         id(screen_schedule_sensor_activation).current_option()) &&
                       id(schedule_mode_always_on);
            then:
              - script.execute: backlight_apply_brightness

  - platform: template
    name: "${entity_screen_schedule_clock_brightness}"
    internal: true
    id: schedule_clock_brightness
    min_value: ${screen_schedule_clock_min_brightness}
    max_value: 100
    step: 1
    initial_value: ${screen_schedule_clock_default_brightness}
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).current_mode_is(
                    espcontrol::DisplayMode::CLOCK);
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "${entity_screen_daytime_brightness}"
    internal: true
    id: brightness_day
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "${entity_screen_nighttime_brightness}"
    internal: true
    id: brightness_night
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Keep the backlight dark after reboot until valid time confirms the schedule.
  # ---------------------------------------------------------------------------
  - id: screen_schedule_boot_guard
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set: { id: manual_wake_ms, value: '0' }
      - script.execute: display_mode_reconcile

  # ---------------------------------------------------------------------------
  # Force the screen asleep because it is outside schedule hours
  # ---------------------------------------------------------------------------
  - id: screen_schedule_sleep
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set: { id: manual_wake_ms, value: '0' }
      - script.execute: display_mode_reconcile

  # ---------------------------------------------------------------------------
  # Wake automatically at the start of the schedule window
  # ---------------------------------------------------------------------------
  - id: screen_schedule_wake
    mode: restart
    then:
      - script.stop: screen_schedule_wake_timeout_check
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set: { id: manual_wake_ms, value: '0' }
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_apply_transition
      - script.execute: screensaver_idle_check
      - script.execute: home_screen_idle_check

  # ---------------------------------------------------------------------------
  # Keep the screen awake during the scheduled night period
  # ---------------------------------------------------------------------------
  - id: screen_schedule_keep_awake
    mode: restart
    then:
      - script.stop: screen_schedule_wake_timeout_check
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set: { id: manual_wake_ms, value: '0' }
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_apply_transition
      - script.execute: home_screen_idle_check

  # ---------------------------------------------------------------------------
  # Show the clock during the scheduled night period
  # ---------------------------------------------------------------------------
  - id: screen_schedule_show_clock
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - script.stop: home_screen_idle_check
      - script.stop: screen_schedule_wake_timeout_check
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
      - globals.set: { id: manual_wake_ms, value: '0' }
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_apply_transition

  # ---------------------------------------------------------------------------
  # Apply the saved screen schedule if local time is valid
  # ---------------------------------------------------------------------------
  - id: screen_schedule_check
    mode: restart
    then:
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          const bool normal_active = screen_schedule_normal_active(
              id(screen_schedule_trigger).state,
              id(schedule_enabled).state,
              id(presence_detected),
              now.is_valid(),
              now.is_valid() ? now.hour : 0,
              (int) id(schedule_on_hour).state,
              (int) id(schedule_off_hour).state,
              id(screen_schedule_sensor_activation).current_option());
          if (!id(schedule_enabled).state ||
              screen_schedule_disabled_trigger(id(screen_schedule_trigger).state) ||
              normal_active || id(schedule_mode_always_on)) {
            id(manual_wake_ms) = 0;
          }
          if (id(manual_wake_ms) != 0) {
            uint32_t elapsed = (uint32_t) (millis() - id(manual_wake_ms));
            float timeout_s = id(schedule_wake_timeout).state;
            if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
            if (timeout_s < 10) timeout_s = 10;
            if (timeout_s > 3600) timeout_s = 3600;
            uint32_t timeout_ms = (uint32_t) (timeout_s * 1000.0f);
            if (elapsed >= timeout_ms) id(manual_wake_ms) = 0;
          }
          id(display_mode_reconcile).execute();

  # ---------------------------------------------------------------------------
  # Put the screen back to sleep after a temporary off-hours wake
  # ---------------------------------------------------------------------------
  - id: screen_schedule_wake_timeout_check
    mode: restart
    then:
      - delay: !lambda |-
          float timeout_s = id(schedule_wake_timeout).state;
          if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
          if (timeout_s < 10) timeout_s = 10;
          if (timeout_s > 3600) timeout_s = 3600;
          return (int) (timeout_s * 1000.0f);
      - lambda: |-
          if (!id(schedule_enabled).state || id(manual_wake_ms) == 0 ||
              id(display_mode_controller).request_active(
                  espcontrol::DisplayRequestSource::MANUAL_SLEEP)) {
            return;
          }

          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          if (screen_schedule_normal_active(
                id(screen_schedule_trigger).state,
                id(schedule_enabled).state,
                id(presence_detected),
                now.is_valid(),
                now.is_valid() ? now.hour : 0,
                (int) id(schedule_on_hour).state,
                (int) id(schedule_off_hour).state,
                id(screen_schedule_sensor_activation).current_option())) {
            id(manual_wake_ms) = 0;
            id(display_mode_reconcile).execute();
            return;
          }

          float timeout_s = id(schedule_wake_timeout).state;
          if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
          if (timeout_s < 10) timeout_s = 10;
          if (timeout_s > 3600) timeout_s = 3600;
          uint32_t timeout_ms = (uint32_t) (timeout_s * 1000.0f);
          uint32_t elapsed = (uint32_t) (millis() - id(manual_wake_ms));
          if (elapsed >= timeout_ms) {
            id(manual_wake_ms) = 0;
            id(display_mode_reconcile).execute();
          }

  # ---------------------------------------------------------------------------
  # Determine correct brightness and apply it
  # ---------------------------------------------------------------------------
  - id: backlight_apply_brightness
    mode: restart
    then:
      - lambda: |-
          if (!id(display_mode_controller).target_mode_is(
                espcontrol::DisplayMode::ACTIVE) &&
              !id(display_mode_controller).target_mode_is(
                espcontrol::DisplayMode::COVER_ART)) return;
          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          if (id(display_mode_controller).target_source_is(
                espcontrol::DisplayRequestSource::SCREEN_SCHEDULE)) {
            if (id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::CLOCK)) return;
            if (id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::DISPLAY_OFF)) {
              id(backlight_force_display_off).execute();
              return;
            }
          }
          if (screen_schedule_waiting_for_time(
                id(screen_schedule_trigger).state,
                id(schedule_enabled).state,
                now.is_valid())) {
            id(backlight_force_display_off).execute();
            return;
          }
          float pct;
          if (id(manual_wake_ms) != 0) {
            pct = id(schedule_wake_brightness).state;
            if (std::isnan(pct) || pct <= 0) pct = 10;
            if (pct < 10) pct = 10;
            if (pct > 100) pct = 100;
          } else if (screen_schedule_night_active(
                       id(screen_schedule_trigger).state,
                       id(schedule_enabled).state,
                       id(presence_detected),
                       now.is_valid(),
                       now.is_valid() ? now.hour : 0,
                       (int) id(schedule_on_hour).state,
                       (int) id(schedule_off_hour).state,
                       id(screen_schedule_sensor_activation).current_option()) &&
                     id(schedule_mode_always_on)) {
            pct = id(schedule_dimmed_brightness).state;
            if (std::isnan(pct) || pct <= 0) pct = 10;
            if (pct < 1) pct = 1;
            if (pct > 100) pct = 100;
          } else {
            bool is_day = id(last_is_daytime);
            int rise_h = id(sunrise_hour);
            int rise_m = id(sunrise_minute);
            int set_h = id(sunset_hour);
            int set_m = id(sunset_minute);
            bool times_valid = brightness_schedule_times(
              id(automatic_brightness_enabled).state,
              id(sunrise_sunset_valid), id(sunrise_hour), id(sunrise_minute),
              id(sunset_hour), id(sunset_minute),
              id(brightness_dawn_time).state, id(brightness_dusk_time).state,
              rise_h, rise_m, set_h, set_m);
            pct = calc_brightness_pct(
              times_valid, rise_h, rise_m, set_h, set_m,
              now.is_valid() ? now.hour : 12, now.is_valid() ? now.minute : 0,
              &is_day, id(brightness_day).state, id(brightness_night).state);
            id(last_is_daytime) = is_day;
          }
          float target = pct / 100.0f;
          if (target < 0.01f) target = 0.01f;
          if (target > 1.0f) target = 1.0f;
          float current = 0.0f;
          id(display_backlight).current_values_as_brightness(&current);
          if (!id(backlight_force_next_write) &&
              id(display_backlight).current_values.is_on() &&
              std::fabs(current - target) < 0.005f) {
            return;
          }
          auto call = id(display_backlight).turn_on();
          call.set_brightness(target);
          call.set_transition_length(400);
          call.perform();
          id(backlight_force_next_write) = false;

  # ---------------------------------------------------------------------------
  # Recalculate sunrise/sunset from timezone coordinates and current date
  # ---------------------------------------------------------------------------
  - id: backlight_recalc_sunrise_sunset
    mode: single
    then:
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          if (!now.is_valid()) return;
          bool use_12h = id(clock_format_12h);
          auto r = recalc_sunrise_sunset(now.year, now.month, now.day_of_month,
                                         id(timezone_select).current_option(),
                                         use_12h);
          id(sunrise_hour) = r.rise_h;
          id(sunrise_minute) = r.rise_m;
          id(sunset_hour) = r.set_h;
          id(sunset_minute) = r.set_m;
          id(sunrise_sunset_valid) = r.valid;
          if (r.valid) {
            id(sunrise_time_sensor).publish_state(r.sunrise_str);
            id(sunset_time_sensor).publish_state(r.sunset_str);
          }
          id(backlight_apply_brightness).execute();

# =============================================================================
# PERIODIC CHECK (60 seconds)
# =============================================================================

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: |-
              return (id(display_mode_controller).target_source_is(
                          espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                      id(display_mode_controller).target_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF)) ||
                     screen_schedule_waiting_for_time(
                       id(screen_schedule_trigger).state,
                       id(schedule_enabled).state,
                       panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
          then:
            - script.execute: backlight_force_display_off

  - interval: 60s
    then:
      - script.execute: screen_schedule_check
      - if:
          condition:
            lambda: |-
              auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
              if (!now.is_valid()) return false;
              int rise_h = id(sunrise_hour);
              int rise_m = id(sunrise_minute);
              int set_h = id(sunset_hour);
              int set_m = id(sunset_minute);
              bool times_valid = brightness_schedule_times(
                id(automatic_brightness_enabled).state,
                id(sunrise_sunset_valid), id(sunrise_hour), id(sunrise_minute),
                id(sunset_hour), id(sunset_minute),
                id(brightness_dawn_time).state, id(brightness_dusk_time).state,
                rise_h, rise_m, set_h, set_m);
              bool changed = check_daylight_transition(
                times_valid, rise_h, rise_m, set_h, set_m,
                now.hour, now.minute, id(last_is_daytime));
              if (changed) id(last_is_daytime) = !id(last_is_daytime);
              return changed;
          then:
            - script.execute: backlight_apply_brightness
      - if:
          condition:
            lambda: |-
              auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
              return now.is_valid() && now.hour == 0 && now.minute == 0;
          then:
            - script.execute: backlight_recalc_sunrise_sunset
