# =============================================================================
# BACKLIGHT - Screensaver, clock overlay, and setup screen dim
# =============================================================================
# Screensaver modes:
#   1. Disabled: no automatic screensaver
#   2. Idle timer: configurable timeout, sleeps after inactivity
#   3. Presence sensor: optional HA binary_sensor, wakes display on detection
# Screen schedule can also force the physical backlight off outside configured
# hours. It shares the same display sleep/wake plumbing but tracks its own state.
# When the screensaver activates, it can dim the current screen, show a drifting
# clock, or turn the display off. The clock label repositions each update for
# burn-in prevention.
# Setup screen dim: dims to 50% after 120s on static setup pages.
# Touch wake is handled by the touchscreen on_touch in device.yaml.
# =============================================================================

button:
  - platform: template
    id: screen_wake
    name: "${entity_screen_wake}"
    icon: "mdi:monitor-arrow-up"
    disabled_by_default: false
    on_press:
      - script.execute: cover_art_pause_after_touch
      - script.wait: cover_art_pause_after_touch
      - script.execute: screensaver_wake

globals:
  - id: manual_wake_ms
    type: uint32_t
    initial_value: '0'
  - id: screensaver_wake_touch_guard_active
    type: bool
    initial_value: 'false'
  - id: screensaver_wake_touch_guard_skip_once
    type: bool
    initial_value: 'false'
  - id: screensaver_wake_restore_pending
    type: bool
    initial_value: 'false'
  - id: screensaver_sensor_sleep_pending
    type: bool
    initial_value: 'false'
  - id: presence_detected
    type: bool
    initial_value: 'false'
  - id: media_player_playing
    type: bool
    initial_value: 'false'
  - id: screensaver_fade_start_level
    type: float
    initial_value: '1.0'
  - id: backlight_force_next_write
    type: bool
    initial_value: 'false'
  - id: screensaver_clock_target_level
    type: float
    initial_value: '0.35'
  - id: screensaver_dimmed_target_level
    type: float
    initial_value: '0.10'
  - id: clock_brightness_migrated
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: clock_brightness_legacy_sync_ready
    type: bool
    initial_value: 'false'
  - id: clock_brightness_legacy_last_level
    type: float
    initial_value: '35.0'
  - id: screensaver_action_migrated
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: screensaver_action_clock
    type: bool
    initial_value: 'false'
  - id: screensaver_action_dimmed
    type: bool
    initial_value: 'false'
  - id: display_mode_controller
    type: espcontrol::DisplayModeController
  # Connectivity setup must remain visible even when a restored time-based
  # schedule would otherwise keep the panel dark while time is unavailable.
  - id: connectivity_setup_display_active
    type: bool
    initial_value: 'false'

esphome:
  on_boot:
    priority: -240
    then:
      - lambda: |-
          auto update_screensaver_action_cache = []() {
            std::string action = id(screensaver_action).current_option();
            id(screensaver_action_clock) = screensaver_action_clock_mode(action);
            id(screensaver_action_dimmed) = screensaver_action_dimmed_mode(action);
          };
          update_screensaver_action_cache();

          if (!id(screensaver_action_migrated)) {
            if (id(clock_screensaver_enabled).state) {
              auto action_call = id(screensaver_action).make_call();
              action_call.set_option("Clock");
              action_call.perform();
            }
            id(screensaver_action_migrated) = true;
            global_preferences->sync();
          }
          update_screensaver_action_cache();

          auto clamp_clock_pct = [](float pct, float fallback) -> float {
            if (std::isnan(pct) || pct <= 0.0f) pct = fallback;
            if (pct < ${screen_saver_clock_min_brightness}.0f) {
              pct = ${screen_saver_clock_min_brightness}.0f;
            }
            if (pct > 100.0f) pct = 100.0f;
            return pct;
          };
          float legacy_pct = clamp_clock_pct(
            id(clock_brightness).state, ${screen_saver_clock_default_brightness}.0f);
          id(clock_brightness_legacy_last_level) = legacy_pct;

          if (!id(clock_brightness_migrated)) {
            float day_pct = clamp_clock_pct(
              id(clock_brightness_day).state, ${screen_saver_clock_default_brightness}.0f);
            float night_pct = clamp_clock_pct(
              id(clock_brightness_night).state, ${screen_saver_clock_default_brightness}.0f);

            if (day_pct == ${screen_saver_clock_default_brightness}.0f &&
                night_pct == ${screen_saver_clock_default_brightness}.0f) {
              auto day_call = id(clock_brightness_day).make_call();
              day_call.set_value(legacy_pct);
              day_call.perform();

              auto night_call = id(clock_brightness_night).make_call();
              night_call.set_value(legacy_pct);
              night_call.perform();
            }

            id(clock_brightness_migrated) = true;
            global_preferences->sync();
          }
      - delay: 10s
      - lambda: 'id(clock_brightness_legacy_sync_ready) = true;'

script:
  # The controller owns decisions; this adapter is the only path that applies
  # migrated ACTIVE, SETUP_DIMMED, DIMMED, CLOCK, COVER_ART, and DISPLAY_OFF transitions.
  - id: display_mode_apply_transition
    mode: restart
    parameters:
      generation: int
      target_mode: int
      previous_mode: int
    then:
      - if:
          condition:
            lambda: |-
              return id(display_mode_controller).transition_is_current(
                  static_cast<uint32_t>(generation),
                  static_cast<espcontrol::DisplayMode>(target_mode));
          then:
            - lambda: |-
                const auto transition = id(display_mode_controller).resolve();
                const bool schedule_owned = transition.winning_source.has_value() &&
                    (*transition.winning_source == espcontrol::DisplayRequestSource::BOOT_GUARD ||
                     *transition.winning_source == espcontrol::DisplayRequestSource::SCREEN_SCHEDULE);
                if (schedule_owned && transition.target_mode == espcontrol::DisplayMode::CLOCK) {
                  backlight_close_modals_for_display_takeover();
                }
            - if:
                condition:
                  lambda: 'return target_mode != static_cast<int>(espcontrol::DisplayMode::COVER_ART);'
                then:
                  - script.execute:
                      id: cover_art_hide_effect
                      generation: !lambda 'return generation;'
                      target_mode: !lambda 'return target_mode;'
                  - script.wait: cover_art_hide_effect
            - if:
                condition:
                  lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::ACTIVE);'
                then:
                  - script.execute:
                      id: display_mode_effect_active
                      generation: !lambda 'return generation;'
                      previous_mode: !lambda 'return previous_mode;'
                  - script.wait: display_mode_effect_active
                  - if:
                      condition:
                        lambda: |-
                              return id(display_mode_controller).transition_is_current(
                                  static_cast<uint32_t>(generation), espcontrol::DisplayMode::ACTIVE);
                      then:
                        - lambda: |-
                            id(display_mode_controller).complete_transition(
                                static_cast<uint32_t>(generation), espcontrol::DisplayMode::ACTIVE);
                else:
                  - if:
                      condition:
                        lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::SETUP_DIMMED);'
                      then:
                        - script.execute:
                            id: display_mode_effect_setup_dimmed
                            generation: !lambda 'return generation;'
                        - script.wait: display_mode_effect_setup_dimmed
                        - lambda: |-
                            id(display_mode_controller).complete_transition(
                                static_cast<uint32_t>(generation), espcontrol::DisplayMode::SETUP_DIMMED);
                      else:
                        - if:
                            condition:
                              lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::DIMMED);'
                            then:
                              - script.execute: screensaver_dimmed_refresh_brightness
                              - script.wait: screensaver_dimmed_refresh_brightness
                              - if:
                                  condition:
                                    lambda: |-
                                      return id(display_mode_controller).transition_is_current(
                                          static_cast<uint32_t>(generation), espcontrol::DisplayMode::DIMMED);
                                  then:
                                    - script.execute:
                                        id: show_dimmed_view
                                        generation: !lambda 'return generation;'
                                    - script.wait: show_dimmed_view
                                    - lambda: |-
                                        id(display_mode_controller).complete_transition(
                                            static_cast<uint32_t>(generation), espcontrol::DisplayMode::DIMMED);
                            else:
                              - if:
                                  condition:
                                    lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::CLOCK);'
                                  then:
                                    - script.execute: clock_screensaver_refresh_brightness
                                    - script.wait: clock_screensaver_refresh_brightness
                                    - if:
                                        condition:
                                          lambda: |-
                                            return id(display_mode_controller).transition_is_current(
                                                static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK);
                                        then:
                                          - script.execute:
                                              id: show_clock_view
                                              generation: !lambda 'return generation;'
                                          - script.wait: show_clock_view
                                          - lambda: |-
                                              id(display_mode_controller).complete_transition(
                                                  static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK);
                                  else:
                                    - if:
                                        condition:
                                          lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::DISPLAY_OFF);'
                                        then:
                                          - script.execute:
                                              id: display_mode_effect_off
                                              generation: !lambda 'return generation;'
                                          - script.wait: display_mode_effect_off
                                          - lambda: |-
                                              id(display_mode_controller).complete_transition(
                                                  static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF);
                                        else:
                                          - if:
                                              condition:
                                                lambda: 'return target_mode == static_cast<int>(espcontrol::DisplayMode::COVER_ART);'
                                              then:
                                                - globals.set:
                                                    id: cover_art_transition_generation
                                                    value: !lambda 'return static_cast<uint32_t>(generation);'
                                                - script.execute:
                                                    id: display_mode_effect_cover_art
                                                    generation: !lambda 'return generation;'
                                                - script.wait: display_mode_effect_cover_art
                                                - lambda: |-
                                                    id(display_mode_controller).complete_transition(
                                                        static_cast<uint32_t>(generation), espcontrol::DisplayMode::COVER_ART);

  - id: display_mode_effect_active
    mode: restart
    parameters:
      generation: int
      previous_mode: int
    then:
      - lvgl.resume:
      - lvgl.widget.hide: dim_screensaver_touch_guard
      - if:
          condition:
            lambda: 'return previous_mode == static_cast<int>(espcontrol::DisplayMode::CLOCK);'
          then:
            - script.execute: clock_bar_apply
            - if:
                condition:
                  lambda: 'return lv_scr_act() == id(screen_off_page)->obj;'
                then:
                  - script.execute: navigate_after_api
            - script.execute: backlight_apply_brightness
            - delay: 300ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::ACTIVE)) {
                  id(display_mode_effect_active).stop();
                }
            - script.execute: hide_clock_view
          else:
            - script.execute: hide_clock_view
            - delay: 100ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::ACTIVE)) {
                  id(display_mode_effect_active).stop();
                }
            - if:
                condition:
                  lambda: 'return lv_scr_act() == id(screen_off_page)->obj;'
                then:
                  - script.execute: navigate_after_api
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::ACTIVE)) {
                  id(display_mode_effect_active).stop();
                }
            - script.execute: clock_bar_apply
            - script.execute: backlight_apply_brightness

  - id: display_mode_effect_setup_dimmed
    mode: restart
    parameters:
      generation: int
    then:
      - if:
          condition:
            lambda: |-
              return id(display_mode_controller).transition_is_current(
                  static_cast<uint32_t>(generation), espcontrol::DisplayMode::SETUP_DIMMED);
          then:
            - light.turn_on:
                id: display_backlight
                brightness: 50%
                transition_length: 2s

  # Mirror sources scheduled for later PRs so their established priority still
  # blocks migrated effects. Only migrated request sources are changed outside
  # this reconciliation point.
  - id: display_mode_reconcile
    mode: restart
    then:
      - lambda: |-
          auto &controller = id(display_mode_controller);
          auto set_request = [&controller](espcontrol::DisplayRequestSource source,
                                           bool active,
                                           espcontrol::DisplayMode mode) {
            if (active) controller.request(source, mode);
            else controller.clear(source);
          };

          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          const bool connectivity_setup = id(connectivity_setup_display_active);
          const bool waiting_for_time = !connectivity_setup && screen_schedule_waiting_for_time(
              id(screen_schedule_trigger).state, id(schedule_enabled).state, now.is_valid());
          const bool schedule_night = !connectivity_setup && screen_schedule_night_active(
              id(screen_schedule_trigger).state,
              id(schedule_enabled).state,
              id(presence_detected),
              now.is_valid(),
              now.is_valid() ? now.hour : 0,
              (int) id(schedule_on_hour).state,
              (int) id(schedule_off_hour).state,
              id(screen_schedule_sensor_activation).current_option());
          const bool schedule_was_active = controller.request_active(
              espcontrol::DisplayRequestSource::SCREEN_SCHEDULE);
          const bool schedule_ended = schedule_was_active && !schedule_night;

          // Entering normal hours is a deliberate scheduled wake. Discard an
          // automatic sleep request that was hidden beneath the night schedule,
          // then let the normal idle/presence timers start a fresh cycle.
          if (schedule_was_active && !schedule_night) {
            controller.clear(espcontrol::DisplayRequestSource::IDLE_TIMER);
            controller.clear(espcontrol::DisplayRequestSource::PRESENCE_SENSOR);
          }

          set_request(espcontrol::DisplayRequestSource::BOOT_GUARD, waiting_for_time,
                      espcontrol::DisplayMode::DISPLAY_OFF);
          set_request(espcontrol::DisplayRequestSource::USER_WAKE,
                      id(manual_wake_ms) != 0, espcontrol::DisplayMode::ACTIVE);
          if (schedule_night) {
            const auto schedule_mode = id(schedule_mode_always_on)
                ? espcontrol::DisplayMode::ACTIVE
                : (id(schedule_mode_clock) ? espcontrol::DisplayMode::CLOCK
                                           : espcontrol::DisplayMode::DISPLAY_OFF);
            controller.request(espcontrol::DisplayRequestSource::SCREEN_SCHEDULE,
                               schedule_mode);

          } else {
            controller.clear(espcontrol::DisplayRequestSource::SCREEN_SCHEDULE);
          }

          // Playback that began while the night schedule was blocking the
          // display did not yet create a media request. Re-evaluate it from
          // live state when normal hours resume.
          if (schedule_ended && id(cover_art_media_playing) &&
              id(cover_art_screensaver_enabled).state) {
            id(cover_art_playback_started).execute();
          }

          const auto transition = controller.resolve();
          const bool migrated_target =
              transition.target_mode == espcontrol::DisplayMode::ACTIVE ||
              transition.target_mode == espcontrol::DisplayMode::SETUP_DIMMED ||
              transition.target_mode == espcontrol::DisplayMode::DIMMED ||
              transition.target_mode == espcontrol::DisplayMode::CLOCK ||
              transition.target_mode == espcontrol::DisplayMode::COVER_ART ||
              transition.target_mode == espcontrol::DisplayMode::DISPLAY_OFF;

          const bool transition_required = controller.transition_required(transition);
          if (transition.target_mode == espcontrol::DisplayMode::COVER_ART &&
              !transition_required &&
              id(cover_art_transition_generation) != transition.generation) {
            // A lower-priority idle or presence request can change the global
            // controller generation while media remains the winner. Adopt that
            // generation so in-flight artwork remains current; actual cover-art
            // dismissal or replacement still runs the guarded hide adapter.
            const uint32_t previous_cover_generation = id(cover_art_transition_generation);
            id(cover_art_transition_generation) = transition.generation;
            if (id(cover_art_download_generation) == previous_cover_generation) {
              id(cover_art_download_generation) = transition.generation;
            }
          }
          if (!migrated_target || !transition_required) return;
          id(display_mode_apply_transition).execute(
              static_cast<int32_t>(transition.generation),
              static_cast<int32_t>(transition.target_mode),
              static_cast<int32_t>(transition.previous_mode));

  - id: display_mode_request_cover_art
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).request(
              espcontrol::DisplayRequestSource::MEDIA_PLAYBACK,
              espcontrol::DisplayMode::COVER_ART);
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_reconcile
      - script.wait: display_mode_apply_transition

  - id: display_mode_clear_cover_art
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MEDIA_PLAYBACK);
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_reconcile
      - script.wait: display_mode_apply_transition

  - id: display_mode_request_automatic
    mode: restart
    parameters:
      target_mode: int
    then:
      - lambda: |-
          auto &controller = id(display_mode_controller);
          const auto source = id(screensaver_sensor_sleep_pending)
              ? espcontrol::DisplayRequestSource::PRESENCE_SENSOR
              : espcontrol::DisplayRequestSource::IDLE_TIMER;
          const auto other = source == espcontrol::DisplayRequestSource::PRESENCE_SENSOR
              ? espcontrol::DisplayRequestSource::IDLE_TIMER
              : espcontrol::DisplayRequestSource::PRESENCE_SENSOR;
          controller.clear(other);
          controller.request(source, static_cast<espcontrol::DisplayMode>(target_mode));
      - script.execute: display_mode_reconcile

  - id: display_mode_clear_automatic
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).clear(espcontrol::DisplayRequestSource::IDLE_TIMER);
          id(display_mode_controller).clear(espcontrol::DisplayRequestSource::PRESENCE_SENSOR);
      - script.execute: display_mode_reconcile

  - id: display_mode_request_setup_dimmed
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).request(
              espcontrol::DisplayRequestSource::SETUP_TIMEOUT,
              espcontrol::DisplayMode::SETUP_DIMMED);
      - script.execute: display_mode_reconcile

  - id: display_mode_clear_setup_dimmed
    mode: restart
    then:
      - lambda: |-
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::SETUP_TIMEOUT);
      - script.execute: display_mode_reconcile

  # Typed takeover ownership is recorded directly in the controller. Requests
  # continue to update underneath a takeover, so ending it resolves current
  # schedule, presence, media, and idle state instead of restoring a snapshot.
  - id: display_takeover_begin
    mode: restart
    parameters:
      takeover_kind: int
    then:
      - lambda: |-
          id(display_mode_controller).begin_takeover(
              static_cast<espcontrol::DisplayTakeoverKind>(takeover_kind));
      - script.execute: display_mode_reconcile
      - script.wait: display_mode_apply_transition

  - id: display_takeover_end
    mode: restart
    parameters:
      takeover_kind: int
    then:
      - lambda: |-
          id(display_mode_controller).end_takeover(
              static_cast<espcontrol::DisplayTakeoverKind>(takeover_kind));
      - script.execute: display_mode_reconcile

  # Screensaver idle timer (restartable)
  - id: screensaver_idle_check
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
              if (screen_schedule_night_active(
                    id(screen_schedule_trigger).state,
                    id(schedule_enabled).state,
                    id(presence_detected),
                    now.is_valid(),
                    now.is_valid() ? now.hour : 0,
                    (int) id(schedule_on_hour).state,
                    (int) id(schedule_off_hour).state,
                    id(screen_schedule_sensor_activation).current_option())) {
                id(screen_schedule_check).execute();
                return false;
              }
              return id(screensaver_mode).state == "timer" ||
                     id(screensaver_mode).state == "sensor";
          then:
            - delay: !lambda |-
                float val = id(screensaver_timeout).state;
                if (std::isnan(val) || val <= 0) val = 300;
                return (int)(val * 1000);
            - if:
                condition:
                  lambda: |-
                    return id(display_mode_controller).target_mode_is(
                               espcontrol::DisplayMode::COVER_ART) ||
                           alarm_display_takeover_active() ||
                           (id(cover_art_screensaver_enabled).state &&
                            id(media_player_sleep_prevention_enabled).state &&
                            id(media_player_playing));
                then:
                  - script.execute: screensaver_idle_check
                else:
                  - if:
                      condition:
                        lambda: 'return id(screensaver_mode).state == "sensor" && id(presence_detected);'
                      then:
                        - script.execute: screensaver_idle_check
                      else:
                        - script.execute: screensaver_sleep_timer

  # Timer mode honours the clock/display-off setting.
  - id: screensaver_sleep_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const std::string &state = id(cover_art_last_playback_state);
              return id(display_mode_controller).target_mode_is(
                         espcontrol::DisplayMode::COVER_ART) ||
                     (id(cover_art_media_playing) &&
                      state != "playing" && state != "buffering" && state != "paused");
          then:
            - script.execute: screensaver_idle_check
          else:
            - lambda: |-
                const auto &controller = id(display_mode_controller);
                if (!controller.takeover_active(espcontrol::DisplayTakeoverKind::INTERACTIVE) &&
                    !controller.takeover_active(espcontrol::DisplayTakeoverKind::CRITICAL)) {
                  navigation_return_home(id(main_page)->obj);
                }
            - if:
                condition:
                  lambda: |-
                    bool voice_active = ${voice_interaction_active_condition};
                    return id(cover_art_screensaver_enabled).state &&
                           id(cover_art_media_playing) &&
                           !voice_active &&
                           id(cover_art_attribute_conditions_match) &&
                           !(id(cover_art_hide_external_input_enabled).state &&
                             id(cover_art_external_input_active)) &&
                           !id(cover_art_media_player_entity).state.empty();
                then:
                  - script.execute: show_cover_art_view
                else:
                  - if:
                      condition:
                        lambda: 'return id(screensaver_action_clock);'
                      then:
                        - script.execute:
                            id: display_mode_request_automatic
                            target_mode: !lambda 'return static_cast<int>(espcontrol::DisplayMode::CLOCK);'
                      else:
                        - script.execute: hide_cover_art_view
                        - if:
                            condition:
                              lambda: 'return id(screensaver_action_dimmed);'
                            then:
                              - script.execute:
                                  id: display_mode_request_automatic
                                  target_mode: !lambda 'return static_cast<int>(espcontrol::DisplayMode::DIMMED);'
                            else:
                              - script.execute:
                                  id: display_mode_request_automatic
                                  target_mode: !lambda 'return static_cast<int>(espcontrol::DisplayMode::DISPLAY_OFF);'
            - globals.set:
                id: screensaver_sensor_sleep_pending
                value: 'false'

  # Sensor mode honours the same clock/display-off setting as timer mode.
  - id: screensaver_sleep_sensor
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - globals.set:
          id: screensaver_sensor_sleep_pending
          value: 'true'
      - script.execute: screensaver_sleep_timer

  # Presence sensor mode is lower priority than the screen schedule. This keeps
  # motion/presence from waking the panel during scheduled off or clock hours.
  - id: screensaver_presence_wake
    mode: restart
    then:
      - script.execute: screen_schedule_check
      - script.wait: screen_schedule_check
      - if:
          condition:
            lambda: |-
              return id(screensaver_mode).state == "sensor" &&
                     !screen_schedule_sensor_trigger(
                         id(screen_schedule_trigger).state);
          then:
            - globals.set: { id: screensaver_sensor_sleep_pending, value: 'false' }
            - if:
                condition:
                  lambda: |-
                    return espcontrol::presence_can_wake_display(
                        id(display_mode_controller).resolve());
                then:
                  - script.execute: screensaver_wake
                else:
                  # Presence must clear a sleep request recorded while the room
                  # was empty, even when cover art or normal cards remain visible.
                  - script.execute: display_mode_clear_automatic

  - id: screensaver_presence_sleep
    mode: restart
    then:
      - script.execute: screen_schedule_check
      - script.wait: screen_schedule_check
      - if:
          condition:
            lambda: |-
              return id(screensaver_mode).state == "sensor" &&
                     !screen_schedule_sensor_trigger(
                         id(screen_schedule_trigger).state);
          then:
            - script.execute: screensaver_sleep_sensor

  - id: screensaver_sleep_display_off
    mode: restart
    then:
      - script.execute: display_mode_reconcile

  - id: backlight_force_display_off
    mode: restart
    then:
      - if:
          condition:
            light.is_on: display_backlight
          then:
            - light.turn_off:
                id: display_backlight
                transition_length: 0s
      - output.turn_off: gpio_backlight_pwm
      - lambda: 'id(gpio_backlight_pwm).turn_off();'

  - id: backlight_pause_display_off
    mode: restart
    parameters:
      generation: int
    then:
      - if:
          condition:
            lambda: |-
              #ifdef ESPCONTROL_KEEP_LVGL_ACTIVE_ON_DISPLAY_OFF
              return false;
              #else
              return true;
              #endif
          then:
            - script.execute: backlight_force_display_off
            - delay: 100ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF)) {
                  id(backlight_pause_display_off).stop();
                }
            - if:
                condition:
                  lambda: |-
                    return id(screen_rotation_select).current_option() == "90" ||
                           id(screen_rotation_select).current_option() == "270";
                then:
                  - lvgl.pause:
                else:
                  - lvgl.pause:
                      show_snow: true
            - script.execute: backlight_force_display_off
          else:
            - lambda: 'ESP_LOGD("backlight", "Keeping LVGL active during display-off so touch can wake the screen");'

  - id: backlight_fade_current_ui_to_black
    mode: restart
    parameters:
      generation: int
      target_mode: int
    then:
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
          float brightness = 1.0f;
          id(display_backlight).current_values_as_brightness(&brightness);
          if (brightness <= 0.01f) brightness = id(display_backlight).remote_values.get_brightness();
          if (brightness <= 0.01f) brightness = 1.0f;
          id(screensaver_fade_start_level) = brightness;
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.85f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.70f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.55f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.40f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.25f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.12f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: !lambda 'return id(screensaver_fade_start_level) * 0.04f;'
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), static_cast<espcontrol::DisplayMode>(target_mode))) {
            id(backlight_fade_current_ui_to_black).stop();
          }
      - output.set_level:
          id: gpio_backlight_pwm
          level: 0%
      - delay: 50ms

  - id: display_mode_effect_off
    mode: restart
    parameters:
      generation: int
    then:
      - lambda: |-
          const auto transition = id(display_mode_controller).resolve();
          const bool immediate = transition.winning_source.has_value() &&
              (*transition.winning_source == espcontrol::DisplayRequestSource::BOOT_GUARD ||
               *transition.winning_source == espcontrol::DisplayRequestSource::SCREEN_SCHEDULE ||
               *transition.winning_source == espcontrol::DisplayRequestSource::MANUAL_SLEEP);
          if (immediate) backlight_close_modals_for_display_takeover();
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF)) {
            id(display_mode_effect_off).stop();
          }
      - script.stop: screensaver_idle_check
      - script.stop: home_screen_idle_check
      - script.stop: cover_art_delay_timer
      - lvgl.resume:
      - script.execute: clock_bar_hide
      - script.wait: clock_bar_hide
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF)) {
            id(display_mode_effect_off).stop();
          }
          const auto transition = id(display_mode_controller).resolve();
          const bool automatic = transition.winning_source.has_value() &&
              (*transition.winning_source == espcontrol::DisplayRequestSource::IDLE_TIMER ||
               *transition.winning_source == espcontrol::DisplayRequestSource::PRESENCE_SENSOR);
          if (automatic) {
            id(backlight_fade_current_ui_to_black).execute(
                generation, static_cast<int>(espcontrol::DisplayMode::DISPLAY_OFF));
          } else {
            id(backlight_force_display_off).execute();
          }
      - script.wait: backlight_fade_current_ui_to_black
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF)) {
            id(display_mode_effect_off).stop();
          }
      - script.execute: hide_clock_view
      - lvgl.widget.hide: dim_screensaver_touch_guard
      - lvgl.page.show: screen_off_page
      - script.execute: clock_bar_hide
      - delay: 50ms
      - lambda: |-
          if (!id(display_mode_controller).transition_is_current(
                static_cast<uint32_t>(generation), espcontrol::DisplayMode::DISPLAY_OFF)) {
            id(display_mode_effect_off).stop();
          }
      - script.execute: backlight_force_display_off
      - script.execute:
          id: backlight_pause_display_off
          generation: !lambda 'return generation;'

  - id: backlight_sleep_display_off
    mode: restart
    then:
      - script.execute: display_mode_reconcile

  - id: backlight_schedule_display_off
    mode: restart
    then:
      - script.execute: display_mode_reconcile

  # Touchscreen long-press sleep. This is stronger than the automatic schedule;
  # the next tap wakes it.
  - id: screen_schedule_manual_sleep
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - lambda: |-
          id(display_mode_controller).request(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP,
              espcontrol::DisplayMode::DISPLAY_OFF);
      - script.execute: display_mode_reconcile

  # Setup screen burn-in protection
  - id: setup_screen_dim_cancel
    mode: restart
    then:
      - script.stop: setup_screen_dim
      - script.execute: display_mode_clear_setup_dimmed

  - id: setup_screen_dim
    mode: restart
    then:
      - script.execute: display_mode_clear_setup_dimmed
      - delay: 120s
      - if:
          condition:
            lambda: |-
              return (id(display_mode_controller).target_source_is(
                          espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                      id(display_mode_controller).target_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF)) ||
                     screen_schedule_waiting_for_time(
                       id(screen_schedule_trigger).state,
                       id(schedule_enabled).state,
                       panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
          then:
            - script.execute: display_mode_reconcile
          else:
            - script.execute: display_mode_request_setup_dimmed

  # Home screen return timer (restartable)
  - id: home_screen_idle_check
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              float val = id(home_screen_timeout).state;
              return !std::isnan(val) && val > 0;
          then:
            - delay: !lambda |-
                float val = id(home_screen_timeout).state;
                if (std::isnan(val) || val <= 0) val = 60;
                return (int)(val * 1000);
            - lambda: |-
                if (!alarm_display_takeover_active()) {
                  navigation_return_home(id(main_page)->obj);
                }

  - id: home_screen_idle_restore
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              float val = id(home_screen_timeout).state;
              if (std::isnan(val) || val <= 0) return false;
              return lv_disp_get_inactive_time(NULL) >= (uint32_t)(val * 1000);
          then:
            - lambda: |-
                if (!alarm_display_takeover_active()) {
                  navigation_return_home(id(main_page)->obj);
                }
          else:
            - script.execute: home_screen_idle_check

  # Wake from screensaver
  - id: screensaver_wake
    # A held or noisy touch can emit another event before the restore delays
    # below finish. Do not restart midway through that restore, otherwise the
    # clock overlay can remain visible indefinitely.
    mode: single
    then:
      - script.stop: screen_schedule_sleep
      - script.stop: backlight_fade_current_ui_to_black
      - script.stop: backlight_sleep_display_off
      - script.stop: backlight_schedule_display_off
      - script.stop: backlight_pause_display_off
      - script.stop: screensaver_sleep_timer
      - script.stop: screensaver_sleep_sensor
      - script.stop: screensaver_sleep_display_off
      - script.stop: screen_schedule_show_clock
      - script.stop: show_clock_view
      - script.stop: clock_screensaver_refresh_brightness
      - script.stop: show_dimmed_view
      - script.stop: screensaver_dimmed_refresh_brightness
      - script.stop: show_cover_art_view
      - script.stop: cover_art_delay_timer
      - script.stop: cover_art_show_track_overlay
      - lambda: |-
          id(screensaver_wake_restore_pending) =
              !id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::ACTIVE);
          id(screensaver_wake_touch_guard_skip_once) =
              id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::COVER_ART) ||
              id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::DISPLAY_OFF);
      - if:
          condition:
            lambda: 'return id(screensaver_wake_touch_guard_skip_once);'
          then:
            - globals.set:
                id: screensaver_wake_touch_guard_active
                value: 'true'
            - lambda: 'screensaver_fill_screen(id(screensaver_wake_touch_guard));'
            - lvgl.widget.show: screensaver_wake_touch_guard
            - lambda: 'lv_obj_move_foreground(id(screensaver_wake_touch_guard));'
            - script.execute: screensaver_wake_touch_block
      - lambda: |-
          id(display_mode_controller).clear(espcontrol::DisplayRequestSource::IDLE_TIMER);
          id(display_mode_controller).clear(espcontrol::DisplayRequestSource::PRESENCE_SENSOR);
          id(display_mode_controller).clear(espcontrol::DisplayRequestSource::SETUP_TIMEOUT);
          id(display_mode_controller).clear(
              espcontrol::DisplayRequestSource::MANUAL_SLEEP);
          if (id(schedule_enabled).state) {
            auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
            bool schedule_night = screen_schedule_night_active(
              id(screen_schedule_trigger).state,
              id(schedule_enabled).state,
              id(presence_detected),
              now.is_valid(),
              now.is_valid() ? now.hour : 0,
              (int) id(schedule_on_hour).state,
              (int) id(schedule_off_hour).state,
              id(screen_schedule_sensor_activation).current_option());
            id(manual_wake_ms) =
              (schedule_night && !id(schedule_mode_always_on)) ? millis() : 0;
          }
      - if:
          condition:
            lambda: 'return id(manual_wake_ms) != 0;'
          then:
            - script.execute: screen_schedule_wake_timeout_check
          else:
            - script.stop: screen_schedule_wake_timeout_check
      - if:
          condition:
            lambda: |-
              const bool restore_pending = id(screensaver_wake_restore_pending);
              id(screensaver_wake_restore_pending) = false;
              return restore_pending ||
                  !id(display_mode_controller).current_mode_is(
                      espcontrol::DisplayMode::ACTIVE);
          then:
            - script.stop: screensaver_idle_check
            - if:
                condition:
                  lambda: |-
                    bool keep_wake_guard = id(screensaver_wake_touch_guard_skip_once);
                    id(screensaver_wake_touch_guard_skip_once) = false;
                    return keep_wake_guard;
                then:
                  - lambda: 'ESP_LOGD("screensaver", "Keeping wake guard until touch release");'
                else:
                  - script.stop: screensaver_wake_touch_guard_clear
                  - globals.set:
                      id: screensaver_wake_touch_guard_active
                      value: 'false'
            - globals.set:
                id: backlight_force_next_write
                value: 'true'
            - script.execute: display_mode_clear_cover_art
            - script.wait: display_mode_clear_cover_art
      - script.execute: screensaver_idle_check
      - script.execute: home_screen_idle_check
      - if:
          condition:
            lambda: |-
              const bool cover_art_touch_return_pending =
                id(cover_art_manual_pause_until_ms) != 0 &&
                (int32_t)(id(cover_art_manual_pause_until_ms) - millis()) > 0;
              float show_after_seconds = id(cover_art_delay).state;
              if (std::isnan(show_after_seconds)) show_after_seconds = 10.0f;
              if (show_after_seconds < 3.0f) show_after_seconds = 3.0f;
              const bool cover_art_disabled_mode_delay =
                id(screensaver_mode).state != "timer" &&
                id(screensaver_mode).state != "sensor" &&
                show_after_seconds > 0.0f;
              return (id(media_player_sleep_prevention_enabled).state ||
                      cover_art_touch_return_pending ||
                      cover_art_disabled_mode_delay) &&
                     id(cover_art_media_playing) &&
                     id(cover_art_screensaver_enabled).state &&
                     !alarm_display_takeover_active();
          then:
            - script.execute: cover_art_start_delay

  - id: screensaver_wake_touch_block
    mode: restart
    then:
      - globals.set:
          id: screensaver_wake_touch_guard_active
          value: 'true'
      - lambda: 'screensaver_fill_screen(id(screensaver_wake_touch_guard));'
      - lvgl.widget.show: screensaver_wake_touch_guard
      - lambda: 'lv_obj_move_foreground(id(screensaver_wake_touch_guard));'
      - wait_until:
          condition:
            lambda: |-
              lv_indev_t *indev = nullptr;
              while ((indev = lv_indev_get_next(indev)) != nullptr) {
                if (lv_indev_get_type(indev) == LV_INDEV_TYPE_POINTER &&
                    lv_indev_get_state(indev) == LV_INDEV_STATE_PRESSED) {
                  return true;
                }
              }
              return false;
          timeout: 150ms
      - wait_until:
          condition:
            lambda: |-
              lv_indev_t *indev = nullptr;
              while ((indev = lv_indev_get_next(indev)) != nullptr) {
                if (lv_indev_get_type(indev) == LV_INDEV_TYPE_POINTER &&
                    lv_indev_get_state(indev) == LV_INDEV_STATE_PRESSED) {
                  return false;
                }
              }
              return true;
          timeout: 2s
      - delay: 250ms
      - script.stop: screensaver_wake_touch_guard_clear
      - globals.set:
          id: screensaver_wake_touch_guard_active
          value: 'false'
      - lvgl.widget.hide: screensaver_wake_touch_guard

  - id: screensaver_wake_touch_guard_clear
    mode: restart
    then:
      - delay: 5s
      - globals.set:
          id: screensaver_wake_touch_guard_active
          value: 'false'

  # Choose and apply the brightness for the dimmed-screen screensaver.
  - id: screensaver_dimmed_refresh_brightness
    mode: restart
    then:
      - lambda: |-
          float pct = id(screensaver_dimmed_brightness).state;
          if (std::isnan(pct) || pct <= 0.0f) pct = 10.0f;
          if (pct < 1.0f) pct = 1.0f;
          if (pct > 100.0f) pct = 100.0f;

          float target = pct / 100.0f;
          if (target < 0.01f) target = 0.01f;
          if (target > 1.0f) target = 1.0f;
          id(screensaver_dimmed_target_level) = target;
      - if:
          condition:
            lambda: |-
              return id(display_mode_controller).current_mode_is(
                  espcontrol::DisplayMode::DIMMED);
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(screensaver_dimmed_target_level);'
                transition_length: 400ms

  # Keep the normal UI visible but lower the backlight and catch the first tap.
  - id: show_dimmed_view
    mode: restart
    parameters:
      generation: int
    then:
      - if:
          condition:
            lambda: |-
              return !id(display_mode_controller).takeover_active(
                         espcontrol::DisplayTakeoverKind::INTERACTIVE) &&
                  id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::DIMMED);
          then:
            - lvgl.resume:
            - script.execute: clock_bar_hide
            - script.wait: clock_bar_hide
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::DIMMED)) {
                  id(show_dimmed_view).stop();
                }
            - script.execute: hide_clock_view
            - lambda: 'refresh_screensaver_fullscreen(id(clock_screensaver), id(dim_screensaver_touch_guard));'
            - lvgl.widget.show: dim_screensaver_touch_guard
            - lambda: 'lv_obj_move_foreground(id(dim_screensaver_touch_guard));'
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(screensaver_dimmed_target_level);'
                transition_length: 2s
          else:
            - lambda: 'ESP_LOGD("backlight", "Skipping dimmed screensaver while image modal is active");'

  # Choose the clock screensaver brightness for the current day/night period.
  - id: clock_screensaver_refresh_brightness
    mode: restart
    then:
      - lambda: |-
          auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());

          float pct = ${screen_saver_clock_default_brightness}.0f;
          if (id(display_mode_controller).target_source_is(
                  espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
              id(display_mode_controller).target_mode_is(
                  espcontrol::DisplayMode::CLOCK)) {
            pct = id(schedule_clock_brightness).state;
            if (std::isnan(pct) || pct <= 0.0f) {
              pct = ${screen_schedule_clock_default_brightness}.0f;
            }
            if (pct < ${screen_schedule_clock_min_brightness}.0f) {
              pct = ${screen_schedule_clock_min_brightness}.0f;
            }
            if (pct > 100.0f) pct = 100.0f;
          } else {
            float day_pct = id(clock_brightness_day).state;
            if (std::isnan(day_pct) || day_pct <= 0.0f) {
              day_pct = ${screen_saver_clock_default_brightness}.0f;
            }
            if (day_pct < ${screen_saver_clock_min_brightness}.0f) {
              day_pct = ${screen_saver_clock_min_brightness}.0f;
            }
            if (day_pct > 100.0f) day_pct = 100.0f;

            float night_pct = id(clock_brightness_night).state;
            if (std::isnan(night_pct) || night_pct <= 0.0f) night_pct = day_pct;
            if (night_pct < ${screen_saver_clock_min_brightness}.0f) {
              night_pct = ${screen_saver_clock_min_brightness}.0f;
            }
            if (night_pct > 100.0f) night_pct = 100.0f;

            bool is_day = id(last_is_daytime);
            int rise_h = id(sunrise_hour);
            int rise_m = id(sunrise_minute);
            int set_h = id(sunset_hour);
            int set_m = id(sunset_minute);
            bool times_valid = brightness_schedule_times(
              id(automatic_brightness_enabled).state,
              id(sunrise_sunset_valid), id(sunrise_hour), id(sunrise_minute),
              id(sunset_hour), id(sunset_minute),
              id(brightness_dawn_time).state, id(brightness_dusk_time).state,
              rise_h, rise_m, set_h, set_m);
            pct = calc_brightness_pct(
              times_valid, rise_h, rise_m, set_h, set_m,
              now.is_valid() ? now.hour : 12, now.is_valid() ? now.minute : 0,
              &is_day, day_pct, night_pct);
            id(last_is_daytime) = is_day;
          }

          float target = pct / 100.0f;
          if (target < 0.01f) target = 0.01f;
          if (target > 1.0f) target = 1.0f;
          id(screensaver_clock_target_level) = target;
      - if:
          condition:
            lambda: |-
              return id(display_mode_controller).current_mode_is(
                  espcontrol::DisplayMode::CLOCK);
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(screensaver_clock_target_level);'
                transition_length: 400ms

  # Show the clock screensaver overlay
  - id: show_clock_view
    mode: restart
    parameters:
      generation: int
    then:
      - if:
          condition:
            lambda: |-
              return !id(display_mode_controller).takeover_active(
                         espcontrol::DisplayTakeoverKind::INTERACTIVE) &&
                  id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK);
          then:
            - lambda: 'navigation_return_home(id(main_page)->obj);'
            - lvgl.widget.hide: dim_screensaver_touch_guard
            - lambda: |-
                apply_clock_screensaver_text_color(id(clock_label), id(schedule_clock_text_color).state);
                auto time = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                if (time.is_valid()) {
                  char buf[8];
                  bool use_12h = id(clock_format_12h);
                  format_clock_time_without_suffix(buf, sizeof(buf),
                                                   time.hour, time.minute, use_12h);
                  lv_label_set_text(id(clock_label), buf);
                  position_clock_screensaver_label(id(clock_screensaver), id(clock_label), time.minute);
                }
            - script.execute: clock_bar_hide
            - script.wait: clock_bar_hide
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - script.execute:
                id: backlight_fade_current_ui_to_black
                generation: !lambda 'return generation;'
                target_mode: !lambda 'return static_cast<int>(espcontrol::DisplayMode::CLOCK);'
            - script.wait: backlight_fade_current_ui_to_black
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - lambda: |-
                lv_obj_t *temperature_labels[] = {
                  id(temperatures),
                };
                hide_clock_bar_top_layer_widgets(temperature_labels, 1,
                                                 id(display_time),
                                                 id(network_status_button));
                network_status_hide_modal();
                refresh_screensaver_fullscreen(id(clock_screensaver), id(dim_screensaver_touch_guard));
                lv_obj_clear_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
                lv_obj_move_foreground(id(clock_screensaver));
            - output.set_level:
                id: gpio_backlight_pwm
                level: 0%
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - output.set_level:
                id: gpio_backlight_pwm
                level: !lambda 'return id(screensaver_clock_target_level) * 0.20f;'
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - output.set_level:
                id: gpio_backlight_pwm
                level: !lambda 'return id(screensaver_clock_target_level) * 0.40f;'
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - output.set_level:
                id: gpio_backlight_pwm
                level: !lambda 'return id(screensaver_clock_target_level) * 0.60f;'
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - output.set_level:
                id: gpio_backlight_pwm
                level: !lambda 'return id(screensaver_clock_target_level) * 0.80f;'
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - output.set_level:
                id: gpio_backlight_pwm
                level: !lambda 'return id(screensaver_clock_target_level);'
            - delay: 50ms
            - lambda: |-
                if (!id(display_mode_controller).transition_is_current(
                      static_cast<uint32_t>(generation), espcontrol::DisplayMode::CLOCK)) {
                  id(show_clock_view).stop();
                }
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(screensaver_clock_target_level);'
                transition_length: 0s
          else:
            - lambda: 'ESP_LOGD("backlight", "Skipping clock screensaver while image modal is active");'

  # Hide the clock screensaver overlay
  - id: hide_clock_view
    mode: single
    then:
      - lvgl.widget.hide: clock_screensaver
      - script.execute: clock_bar_apply

  # Keep the clock above any screen changes or top-layer overlays that appear
  # after the screensaver starts.
  - id: clock_screensaver_keep_on_top
    mode: restart
    then:
      - lambda: |-
          if (!id(display_mode_controller).current_mode_is(
                espcontrol::DisplayMode::CLOCK)) return;
          lv_obj_t *temperature_labels[] = {
            id(temperatures),
          };
          hide_clock_bar_top_layer_widgets(temperature_labels, 1,
                                           id(display_time),
                                           id(network_status_button));
          network_status_hide_modal();
          refresh_screensaver_fullscreen(id(clock_screensaver), id(dim_screensaver_touch_guard));
          lv_obj_move_foreground(id(clock_screensaver));

# -----------------------------------------------------------------------------
# Clock screensaver drift update (repositions label for burn-in prevention)
# -----------------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - script.execute: clock_screensaver_keep_on_top
      - script.execute: display_mode_reconcile
  - interval: 30s
    then:
      - if:
          condition:
            lambda: |-
              return id(display_mode_controller).current_mode_is(
                  espcontrol::DisplayMode::CLOCK);
          then:
            - script.execute: clock_screensaver_refresh_brightness
      - lambda: |-
          if (!id(display_mode_controller).current_mode_is(
                espcontrol::DisplayMode::CLOCK)) return;
          apply_clock_screensaver_text_color(id(clock_label), id(schedule_clock_text_color).state);
          auto time = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
          if (!time.is_valid()) return;
          char buf[8];
          bool use_12h = id(clock_format_12h);
          format_clock_time_without_suffix(buf, sizeof(buf),
                                           time.hour, time.minute, use_12h);
          lv_label_set_text(id(clock_label), buf);
          position_clock_screensaver_label(id(clock_screensaver), id(clock_label), time.minute);
