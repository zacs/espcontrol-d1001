# =============================================================================
# FIRMWARE UPDATE - OTA and HTTP update from GitHub
# =============================================================================
# Provides OTA and HTTP-based firmware updates. The device checks a manifest
# on GitHub and can auto-update when new versions are available. Update checks
# run on an interval (hourly, daily, weekly, monthly) when auto-update is
# enabled; a manual "Check for Update" button triggers an immediate check.
# =============================================================================

substitutions:
  firmware_version: "dev"
  # Where the device checks for updates. Default is the upstream GitHub Pages
  # manifest; a device package can override this substitution to point the
  # in-UI update checker at a different repo/host (e.g. a fork's releases).
  firmware_update_manifest_url: "https://jtenniswood.github.io/espcontrol/firmware/${firmware_manifest_slug}/manifest.json"

esphome:
  project:
    name: jtenniswood.espcontrol
    version: "${firmware_version}"
  on_boot:
    - priority: 200
      then:
        - text_sensor.template.publish:
            id: firmware_version_sensor
            state: "${firmware_version}"
    - priority: -50
      then:
        - if:
            condition:
              lambda: 'return id(firmware_update_complete_pending);'
            then:
              - if:
                  condition:
                    lambda: |-
                      auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                      return id(display_mode_controller).target_schedule_inactive() ||
                             screen_schedule_waiting_for_time(
                               id(screen_schedule_trigger).state,
                               id(schedule_enabled).state,
                               now.is_valid());
                  then:
                    - globals.set:
                        id: firmware_update_complete_pending
                        value: 'false'
                    - lambda: 'global_preferences->sync();'
                  else:
                    - script.execute: show_update_complete_next_boot

globals:
  - id: update_check_counter
    type: int
    initial_value: '1'
  - id: manual_check_only
    type: bool
    initial_value: 'false'
  - id: firmware_update_complete_pending
    type: bool
    restore_value: true
    initial_value: 'false'

script:
  - id: show_update_starting
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - script.stop: home_screen_idle_check
      - script.execute: setup_screen_dim_cancel
      - lambda: |-
          media_volume_hide_modal();
          climate_control_hide_modal();
          option_select_hide_modal();
          switch_confirmation_hide_modal();
          alarm_pin_hide_modal();
          network_status_hide_modal();
          lv_label_set_text(id(loading_status_icon), "${icon_progress_clock}");
          lv_label_set_text(id(loading_status_title), espcontrol_i18n("Installing update"));
          lv_label_set_text(id(loading_status_label), espcontrol_i18n("Preparing the screen\nDo not power off"));
      - lvgl.resume:
      - script.execute: clock_bar_hide
      - lvgl.page.show: loading_page
      - light.turn_on:
          id: display_backlight
          brightness: 90%
          transition_length: 200ms
      - delay: 900ms

  - id: show_update_writing
    mode: restart
    then:
      - globals.set:
          id: firmware_update_complete_pending
          value: 'false'
      - lambda: |-
          lv_label_set_text(id(loading_status_icon), "${icon_progress_clock}");
          lv_label_set_text(id(loading_status_title), espcontrol_i18n("Installing update"));
          lv_label_set_text(id(loading_status_label), espcontrol_i18n("The screen may turn off\nDo not power off"));
      - lvgl.resume:
      - script.execute: clock_bar_hide
      - lvgl.page.show: loading_page
      # Expected during firmware writes: blanking the backlight reduces power
      # and avoids drawing while flash is busy. Do not treat this as a modal
      # screensaver blank.
      - script.execute: backlight_force_display_off
      - script.wait: backlight_force_display_off

  - id: show_update_complete_next_boot
    mode: single
    then:
      - script.execute: setup_screen_dim_cancel
      - lambda: |-
          lv_label_set_text(id(loading_status_icon), "${icon_check}");
          lv_label_set_text(id(loading_status_title), espcontrol_i18n("Update complete"));
          lv_label_set_text(id(loading_status_label), espcontrol_i18n("Restarting display"));
      - lvgl.resume:
      - script.execute: clock_bar_hide
      - lvgl.page.show: loading_page
      - light.turn_on:
          id: display_backlight
          brightness: 90%
          transition_length: 200ms
      - delay: 4s
      - globals.set:
          id: firmware_update_complete_pending
          value: 'false'
      - lambda: 'global_preferences->sync();'
      - script.execute: clock_bar_hide
      - lvgl.page.show: loading_page

  - id: show_update_failed
    mode: restart
    then:
      - globals.set:
          id: firmware_update_complete_pending
          value: 'false'
      - lambda: |-
          global_preferences->sync();
          lv_label_set_text(id(loading_status_icon), "${icon_progress_clock}");
          lv_label_set_text(id(loading_status_title), espcontrol_i18n("Update failed"));
          lv_label_set_text(id(loading_status_label), espcontrol_i18n("Try installing the update again"));
      - lvgl.resume:
      - script.execute: clock_bar_hide
      - lvgl.page.show: loading_page
      - light.turn_on:
          id: display_backlight
          brightness: 90%
          transition_length: 200ms
      - delay: 8s
      - script.execute: navigate_after_api

  - id: firmware_install_update
    mode: single
    then:
      - lambda: 'id(manual_check_only) = true;'
      - component.update: firmware_update
      - wait_until:
          condition:
            update.is_available: firmware_update
          timeout: 30s
      - if:
          condition:
            update.is_available: firmware_update
          then:
            - script.execute: show_update_starting
            - script.wait: show_update_starting
            - script.execute: show_update_writing
            - script.wait: show_update_writing
            - update.perform: firmware_update
      - delay: 15s
      - lambda: 'id(manual_check_only) = false;'

update:
  - platform: http_request
    id: firmware_update
    name: "${entity_firmware_update}"
    internal: true
    source: ${firmware_update_manifest_url}
    update_interval: never
    on_update_available:
      then:
        - if:
            condition:
              lambda: 'return id(auto_update_switch).state && !id(manual_check_only);'
            then:
              - script.execute: show_update_starting
              - script.wait: show_update_starting
              - script.execute: show_update_writing
              - script.wait: show_update_writing
              - update.perform: firmware_update

switch:
  - platform: template
    name: "${entity_firmware_auto_update}"
    id: auto_update_switch
    entity_category: config
    icon: "mdi:update"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: sg_firmware

select:
  - platform: template
    name: "${entity_firmware_update_frequency}"
    id: update_frequency_select
    entity_category: config
    icon: "mdi:timer-outline"
    options:
      - "Hourly"
      - "Daily"
      - "Weekly"
      - "Monthly"
    initial_option: "Daily"
    optimistic: true
    restore_value: true
    web_server:
      sorting_group_id: sg_firmware

interval:
  - interval: 1h
    then:
      - lambda: |-
          if (!id(auto_update_switch).state) return;
          if (should_check_update(id(update_check_counter), id(update_frequency_select).current_option()))
            id(firmware_update).update();
          id(update_check_counter) = id(update_check_counter) + 1;

text_sensor:
  - platform: template
    name: "${entity_firmware_version}"
    id: firmware_version_sensor
    entity_category: diagnostic
    icon: "mdi:tag"
    update_interval: never
    lambda: 'return {"${firmware_version}"};'
    web_server:
      sorting_group_id: sg_firmware

button:
  - platform: template
    name: "${entity_firmware_check_for_update}"
    entity_category: config
    icon: "mdi:update"
    web_server:
      sorting_group_id: sg_firmware
    on_press:
      - lambda: 'id(manual_check_only) = true;'
      - component.update: firmware_update
      - delay: 15s
      - lambda: 'id(manual_check_only) = false;'

  - platform: template
    name: "${entity_firmware_install_update}"
    entity_category: config
    icon: "mdi:download"
    web_server:
      sorting_group_id: sg_firmware
    on_press:
      - script.execute: firmware_install_update
