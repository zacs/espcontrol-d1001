# =============================================================================
# SCREEN: WIFI SETUP
# =============================================================================
# Captive portal instructions shown when WiFi is disconnected.
# =============================================================================

lvgl:
  pages:
    - id: wifi_setup_page
      bg_color: 0x000000
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            width: $screen_width
            height: $screen_height
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.execute: setup_screen_dim_cancel
                - light.turn_on:
                    id: display_backlight
                    brightness: 90%
                - script.execute: setup_screen_dim
            widgets:
              - obj:
                  align: center
                  width: $content_width
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: $setup_pad_row
                  widgets:
                    - label:
                        text_font: $setup_icon_font_id
                        text: $icon_wifi
                        text_color: 0xFFFFFF
                        text_align: center
                    - label:
                        id: wifi_setup_title
                        text: ""
                        text_font: $setup_title_font_id
                        text_color: 0xFFFFFF
                        width: $content_width
                        text_align: center
                    - label:
                        id: wifi_setup_instructions
                        text: ""
                        text_font: $setup_body_font_id
                        text_color: 0xB0B0B0
                        width: $content_width
                        text_align: center

script:
  - id: network_setup_text_refresh
    mode: restart
    then:
      - lambda: |-
          lv_label_set_text(id(wifi_setup_title), espcontrol_i18n("WiFi Setup"));
          lv_label_set_text(
              id(wifi_setup_instructions),
              espcontrol_i18n("Connect to the setup hotspot\nthen open 192.168.4.1"));
