# =============================================================================
# SCREEN: LOADING
# =============================================================================
# Boot screen for Ethernet-only builds. Must be the first page included in
# packages.yaml so LVGL shows it at startup. If Ethernet is not connected after
# the grace period, switches to ethernet_setup_page.
# =============================================================================

globals:
  - id: boot_grace_period
    type: bool
    initial_value: 'true'

lvgl:
  pages:
    - id: loading_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - obj:
            align: center
            width: $content_width
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: $setup_loading_pad_row
            widgets:
              - label:
                  id: loading_status_icon
                  text_font: $setup_icon_font_id
                  text: $icon_ethernet
                  text_color: 0xFFFFFF
                  text_align: center
              - label:
                  id: loading_status_title
                  text: ""
                  text_font: $setup_title_font_id
                  text_color: 0xFFFFFF
                  width: $content_width
                  text_align: center
              - label:
                  id: loading_status_label
                  text: ""
                  text_font: $setup_body_font_id
                  text_color: 0xB0B0B0
                  width: $content_width
                  text_align: center
              # Hidden slider ensures LVGL compiles lv_slider for dynamic use
              - slider:
                  hidden: true
                  width: 0
                  height: 0
              # Hidden arc ensures LVGL compiles lv_arc for modal controls.
              - arc:
                  hidden: true
                  width: 0
                  height: 0
    - id: screen_off_page
      bg_color: 0x000000
      scrollable: false

esphome:
  on_boot:
    - priority: -200
      then:
        - lvgl.resume:
        - script.execute: clock_bar_hide
        - lambda: |-
            lv_label_set_text(id(loading_status_title), espcontrol_i18n("Starting up"));
            lv_label_set_text(id(loading_status_label), espcontrol_i18n("Booting"));
        - lvgl.page.show: loading_page
        - delay: 100ms
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return id(display_mode_controller).target_schedule_inactive() ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              # Expected on boot when schedule logic says the panel should
              # remain dark, or while time is not ready enough to decide.
              - script.execute: backlight_force_display_off
            else:
              - light.turn_on:
                  id: display_backlight
                  brightness: 90%
                  transition_length: 500ms
    - priority: -100
      then:
        - lambda: |-
            lv_label_set_text(id(loading_status_label), espcontrol_i18n("Connecting to Ethernet"));
        - delay: 15s
        - lambda: 'id(boot_grace_period) = false;'
        - if:
            condition:
              lambda: |-
                return ethernet::global_eth_component == nullptr ||
                       !ethernet::global_eth_component->is_connected();
            then:
              - script.execute: clock_bar_hide
              - lvgl.page.show: ethernet_setup_page
              - script.execute: setup_screen_dim
