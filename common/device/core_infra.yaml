# =============================================================================
# CORE INFRASTRUCTURE - Shared API, logging, web server, and restart button
# =============================================================================
# Included by each device's device.yaml via packages. Contains config that is
# identical across all hardware targets.
# =============================================================================

esphome:
  # Enable LVGL's bidirectional text algorithm so right-to-left scripts
  # (Hebrew, Arabic) render in visual order.
  build_flags:
    - "-DLV_USE_BIDI=1"
    - '-DESPCONTROL_DEVICE_SLUG=\"${device_slug}\"'

api:
  reboot_timeout: 0s
  homeassistant_states: true
  homeassistant_services: true
  on_client_connected:
    - lambda: |-
        register_local_sensor_endpoint();
        ESP_LOGI("api", "API client connected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (is_home_assistant && ha_api_connected()) {
          id(ha_restore_after_api).execute();
          if (!client_address.empty()) {
            std::string host = client_address;
            if (host.rfind("::ffff:", 0) == 0) host = host.substr(7);
            if (host.find('.') != std::string::npos) {
              size_t port_separator = host.find(':');
              if (port_separator != std::string::npos) host = host.substr(0, port_separator);
            } else if (host.find(':') != std::string::npos && host.front() != '[') {
              host = "[" + host + "]";
            }
            int port = static_cast<int>(id(cover_art_home_assistant_artwork_port).state);
            id(cover_art_home_assistant_base_url) =
              id(cover_art_home_assistant_artwork_protocol).current_option() + "://" + host + ":" + std::to_string(port);
            ESP_LOGI("api", "Using Home Assistant base URL: %s",
                     id(cover_art_home_assistant_base_url).c_str());
          } else {
            ESP_LOGW("api", "Home Assistant API client address is empty; image proxy base URL not updated");
          }
          refresh_image_cards();
          if (ha_api_state_connected()) {
            refresh_weather_forecast_cards();
            ha_flush_deferred_state_requests();
          }
        }
        register_local_action_endpoint();
    - delay: 2s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          ha_flush_deferred_state_requests();
        }
        todo_reload_active_modal();
    - delay: 8s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          refresh_weather_forecast_cards();
          ha_flush_deferred_state_requests();
        }
        todo_reload_active_modal();
    - delay: 20s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          refresh_weather_forecast_cards();
          ha_flush_deferred_state_requests();
        }
        todo_reload_active_modal();
    - delay: 25s
    - lambda: |-
        if (ha_api_state_connected()) {
          refresh_weather_forecast_cards();
          ha_flush_deferred_state_requests();
        }
        todo_reload_active_modal();
  on_client_disconnected:
    - lambda: |-
        ESP_LOGW("api", "API client disconnected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (!is_home_assistant && ha_api_state_connected()) {
          return;
        }
        weather_forecast_cancel_pending_requests();
        cover_stop_cancel_pending_request();
        todo_cancel_pending_request("api disconnected");

interval:
  - interval: 5s
    then:
      - lambda: |-
          weather_forecast_cancel_stale_requests();
          weather_forecast_send_next_queued();
          ha_flush_deferred_state_requests();
          todo_retry_waiting_modal();

  - interval: 1h
    then:
      - lambda: |-
          refresh_weather_forecast_cards();

logger:
  logs:
    light: WARN
    script: INFO

http_request:
  id: http_req
  timeout: 10s

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://jtenniswood.github.io/espcontrol/webserver/www.js?device=${device_slug}&v=${firmware_version}&ui=20260714-shared
  sorting_groups:
    - id: sg_button
      name: "Button Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_brightness
      name: "Brightness"
      sorting_weight: 25
    - id: sg_screensaver
      name: "Screensaver"
      sorting_weight: 30
    - id: sg_connectivity
      name: "Connectivity"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40
button:
  - platform: restart
    name: "${entity_display_restart}"

  - platform: template
    name: "Apply Configuration"
    internal: true
    disabled_by_default: true
    icon: mdi:restart
    entity_category: config
    on_press:
      then:
        # Flush web UI settings before rebooting; ESPHome normally batches
        # preference writes, so an immediate restart can otherwise lose them.
        - lambda: |-
            global_preferences->sync();
            App.safe_reboot();

select:
  - platform: template
    name: "${entity_home_assistant_artwork_protocol}"
    internal: true
    id: cover_art_home_assistant_artwork_protocol
    entity_category: config
    icon: "mdi:protocol"
    optimistic: true
    restore_value: true
    initial_option: "http"
    options:
      - "http"
      - "https"
    web_server:
      sorting_group_id: sg_connectivity
    set_action:
      - lambda: |-
          refresh_image_cards();

number:
  - platform: template
    name: "Home Assistant Artwork Port"
    internal: true
    id: cover_art_home_assistant_artwork_port
    entity_category: config
    icon: "mdi:lan-connect"
    optimistic: true
    restore_value: true
    initial_value: 8123
    min_value: 1
    max_value: 65535
    step: 1
    mode: box
    web_server:
      sorting_group_id: sg_connectivity
    set_action:
      - lambda: |-
          std::string current = id(cover_art_home_assistant_base_url);
          if (!current.empty()) {
            size_t host_start = current.find("://");
            host_start = host_start == std::string::npos ? 0 : host_start + 3;
            std::string host = current.substr(host_start);
            if (!host.empty() && host.front() == '[') {
              size_t host_end = host.find(']');
              if (host_end != std::string::npos) host = host.substr(0, host_end + 1);
            } else {
              size_t port_separator = host.find(':');
              if (port_separator != std::string::npos) host = host.substr(0, port_separator);
            }
