# =============================================================================
# CORE INFRASTRUCTURE - Shared API, logging, web server, and restart button
# =============================================================================
# Included by each device's device.yaml via packages. Contains config that is
# identical across all hardware targets.
# =============================================================================

esphome:
  # Enable LVGL's bidirectional text algorithm so right-to-left scripts
  # (Hebrew, Arabic) render in visual order.
  platformio_options:
    build_flags:
      - "-DLV_USE_BIDI=1"

api:
  reboot_timeout: 0s
  homeassistant_states: true
  homeassistant_services: true
  on_client_connected:
    - lambda: |-
        ESP_LOGI("api", "API client connected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (is_home_assistant && ha_api_connected()) {
          if (!client_address.empty()) {
            std::string host = client_address;
            if (host.rfind("::ffff:", 0) == 0) host = host.substr(7);
            if (host.find('.') != std::string::npos) {
              size_t port_separator = host.find(':');
              if (port_separator != std::string::npos) host = host.substr(0, port_separator);
            } else if (host.find(':') != std::string::npos && host.front() != '[') {
              host = "[" + host + "]";
            }
            id(cover_art_home_assistant_base_url) = "http://" + host + ":8123";
            ESP_LOGI("api", "Using Home Assistant base URL: %s",
                     id(cover_art_home_assistant_base_url).c_str());
          } else {
            ESP_LOGW("api", "Home Assistant API client address is empty; image proxy base URL not updated");
          }
          refresh_image_cards();
          if (ha_api_state_connected()) {
            apply_registered_ha_control_availability(true);
            ha_retry_unavailable_states(true);
            refresh_weather_forecast_cards();
          }
        }
    - delay: 2s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          ha_retry_unavailable_states(true);
        }
        todo_reload_active_modal();
    - delay: 8s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          ha_retry_unavailable_states(true);
          refresh_weather_forecast_cards();
        }
        todo_reload_active_modal();
    - delay: 20s
    - lambda: |-
        if (ha_api_connected()) refresh_image_cards();
        if (ha_api_state_connected()) {
          ha_retry_unavailable_states(true);
          refresh_weather_forecast_cards();
        }
        todo_reload_active_modal();
  on_client_disconnected:
    - lambda: |-
        ESP_LOGW("api", "API client disconnected: %s", client_info.c_str());
        bool is_home_assistant = client_info.find("Home Assistant") != std::string::npos;
        if (!is_home_assistant && ha_api_state_connected()) {
          return;
        }
        weather_forecast_cancel_pending_requests();
        cover_stop_cancel_pending_request();
        todo_cancel_pending_request("api disconnected");
        apply_registered_ha_control_availability(false);

interval:
  - interval: 5s
    then:
      - lambda: |-
          weather_forecast_cancel_stale_requests();
          weather_forecast_send_next_queued();
          ha_retry_unavailable_states();
          todo_retry_waiting_modal();

  - interval: 1h
    then:
      - lambda: |-
          refresh_weather_forecast_cards();

logger:
  logs:
    light: WARN
    script: INFO

http_request:
  id: http_req
  timeout: 10s

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://cdn.jsdelivr.net/gh/jtenniswood/espcontrol@871bb1261ed1aee0d5e1ed23434d7bef1fdaa4e0/docs/public/webserver/${device_slug}/www.js?v=${firmware_version}&ui=20260609-screen-lock-touch
  sorting_groups:
    - id: sg_button
      name: "Button Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_brightness
      name: "Brightness"
      sorting_weight: 25
    - id: sg_screensaver
      name: "Screensaver"
      sorting_weight: 30
    - id: sg_connectivity
      name: "Connectivity"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40
    - id: sg_developer
      name: "Developer"
      sorting_weight: 90

button:
  - platform: template
    name: "Apply Configuration"
    internal: true
    disabled_by_default: true
    icon: mdi:restart
    entity_category: config
    on_press:
      then:
        # Flush web UI settings before rebooting; ESPHome normally batches
        # preference writes, so an immediate restart can otherwise lose them.
        - lambda: |-
            global_preferences->sync();
            App.safe_reboot();

switch:
  - platform: template
    name: "${entity_developer_experimental_features}"
    internal: true
    id: developer_experimental_features
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:flask-outline"
    web_server:
      sorting_group_id: sg_developer
