# =============================================================================
# CLOCK SCREENSAVER - Full-screen clock overlay for idle display
# =============================================================================
# Black overlay with a large thin-font time label. Hidden by default; shown
# by backlight.yaml when the clock screensaver is enabled and the idle
# timeout fires. The label is positioned absolutely so the interval can
# drift it for burn-in prevention.
# =============================================================================

font:
  - file: "gfonts://Roboto@Thin"
    id: font_number_clock
    size: ${clock_font_size}
    bpp: 4
    glyphs: " 0123456789:"

lvgl:
  top_layer:
    widgets:
      - obj:
          id: clock_screensaver
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0x000000
          bg_opa: 100%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
          widgets:
            - label:
                id: clock_label
                text_font: font_number_clock
                text_color: 0xFFFFFF
                text: "00:00"
      - obj:
          id: dim_screensaver_touch_guard
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_opa: 0%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
          on_press:
            then:
              - script.execute: screensaver_wake
      - obj:
          id: screensaver_wake_touch_guard
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_opa: 0%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
