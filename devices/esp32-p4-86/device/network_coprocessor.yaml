# =============================================================================
# NETWORK CO-PROCESSOR - WiFi firmware variant
# =============================================================================
# The Waveshare ESP32-P4 86 Panel uses an ESP32-C6 co-processor for hosted
# WiFi/BLE over SDIO. This is only needed by the normal WiFi firmware.
# =============================================================================

esp32_hosted:
  variant: esp32c6
  # Keep the preallocated transport receive buffers for reliable inbound
  # connections, but place them in PSRAM to protect scarce internal memory.
  use_psram: true
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 20MHz
