# =============================================================================
# DEVICE - Waveshare ESP32-P4 86 Panel hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" square panel.
# Includes the ESP32-P4 main SoC, ESP32-C6 hosted WiFi co-processor, MIPI
# DSI display, GT911 capacitive touchscreen, backlight PWM, and two relays on
# the ESP32-P4-86-Panel-ETH-2RO bottom board.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"
  mdi_font_file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"

# ---------------------------------------------------------------------------
# ESP32-P4 platform (32MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  variant: esp32p4
  # Waveshare documents this panel with 32MB external NOR flash.
  flash_size: 32MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    # stick to recommended version, currently 5.5.4, 55.03.39 with tool-esptoolpy 5.3.0. No issues
    #version: 5.5.2
    # pioarduino 55.03.38-1 pulls tool-esptoolpy 5.2.0, which can install
    # incompletely in ESPHome containers and then fail while creating .bin files.
    #platform_version: 55.03.37
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
      disable_vfs_support_termios: false
      disable_vfs_support_select: false
      disable_vfs_support_dir: false
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_PERF: "y"
      # HTTPS firmware checks need more stack on ESP32-P4; the default main
      # task stack can trip the stack protector during mbedTLS setup.
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Keep the ESP32 task watchdog long enough for display startup while
      # remaining compatible with ESPHome 2026.4 and newer.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      # Keep hosted task stacks in PSRAM so the display and audio paths retain
      # enough internal memory for DMA-capable allocations.
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
      # The ESP32-C6 hosted WiFi link shares scarce internal/DMA memory with
      # the full-duplex TDM audio path. Keep network bursts small while testing
      # dual-mic SE/AEC stability.
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_WIFI_RMT_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_WIFI_RMT_DYNAMIC_RX_BUFFER_NUM: "16"
      CONFIG_WIFI_RMT_DYNAMIC_TX_BUFFER_NUM: "16"
      CONFIG_WIFI_RMT_AMPDU_RX_ENABLED: "n"
      CONFIG_WIFI_RMT_AMPDU_TX_ENABLED: "n"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM: "16"
      CONFIG_ESP_WIFI_AMPDU_RX_ENABLED: "n"
      CONFIG_ESP_WIFI_AMPDU_TX_ENABLED: "n"
      CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "16384"
      CONFIG_LWIP_TCP_WND_DEFAULT: "16384"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "16"
      CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "16"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

network:
  enable_high_performance: false

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  build_flags:
    - "-Wno-deprecated-declarations"
    - "-DESPCONTROL_DISABLE_TODO=1"
    - "-DESPCONTROL_MAX_GRID_SLOTS=9"
    # Force cached ESPHome objects to rebuild after the 2026.5
    # core/scheduler/watchdog changes; stale 2026.4 objects can boot-loop.
    - "-DESPCONTROL_ESPHOME_2026_5_REBUILD=1"
    # Keep the ESP-IDF header warning suppressed without warning on C sources.
    - "-Wno-literal-suffix"
    - "-Wno-complain-wrong-lang"
  on_boot:
    - priority: 700
      then:
        - lambda: |-
            register_internal_relay(
              "relay_1", "Relay 1",
              [=](bool on) {
                if (on) id(relay_1).turn_on();
                else id(relay_1).turn_off();
              },
              [=]() { id(relay_1_push).execute(); },
              [=]() -> bool { return id(relay_1).state; });
            register_internal_relay(
              "relay_2", "Relay 2",
              [=](bool on) {
                if (on) id(relay_2).turn_on();
                else id(relay_2).turn_off();
              },
              [=]() { id(relay_2_push).execute(); },
              [=]() -> bool { return id(relay_2).state; });
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation
        - script.execute: clock_bar_apply

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  speed: 200MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
    on_error:
      then:
        - script.execute: show_update_failed

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# The Waveshare USB-C debug port is exposed through a USB-UART bridge.
logger:
  hardware_uart: UART0

# ---------------------------------------------------------------------------
# Power management (LDO channel for DSI PHY)
# ---------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO26
    id: gpio_backlight_pwm
    frequency: ${backlight_pwm_frequency}
    inverted: true
    min_power: 0.0
    max_power: 0.8

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(display_mode_controller).target_source_is(
                            espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                        id(display_mode_controller).target_mode_is(
                            espcontrol::DisplayMode::DISPLAY_OFF)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(display_mode_controller).current_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF);
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).target_mode_is(
                    espcontrol::DisplayMode::ACTIVE);
            then:
              - script.execute: screen_schedule_manual_sleep

# ---------------------------------------------------------------------------
# Built-in relays (ESP32-P4-86-Panel-ETH-2RO bottom board)
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    name: Relay 1
    id: relay_1
    icon: mdi:electric-switch
    pin:
      number: GPIO32
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", false);'

  - platform: gpio
    name: Relay 2
    id: relay_2
    icon: mdi:electric-switch
    pin:
      number: GPIO46
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", false);'

# Momentary relay buttons for push-button/dimmer inputs.
button:
  - platform: template
    name: Relay 1 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_1_push

  - platform: template
    name: Relay 2 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_2_push

# ---------------------------------------------------------------------------
# Display (4" 720x720 MIPI DSI panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-P4-86-PANEL
    update_interval: never
    auto_clear_enabled: false

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  buffer_size: 100%
  displays: my_display
  rotation: 0
  byte_order: little_endian
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: relay_1_push
    mode: restart
    then:
      - switch.turn_on: relay_1
      - delay: 200ms
      - switch.turn_off: relay_1

  - id: relay_2_push
    mode: restart
    then:
      - switch.turn_on: relay_2
      - delay: 200ms
      - switch.turn_off: relay_2

  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
              - script.execute: clock_bar_apply
