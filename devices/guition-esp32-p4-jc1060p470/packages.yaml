# =============================================================================
# PACKAGES - ESPHome include manifest
# =============================================================================
# Load order follows dependencies: device and assets first, then config,
# addons, and screens. Loading screen must be the first page so LVGL shows
# it at startup. Main page (lvgl.yaml) is included after setup screens.
# =============================================================================

substitutions:
  cover_art_placeholder_file: "https://raw.githubusercontent.com/jtenniswood/espcontrol/main/common/assets/cover_art_placeholder.svg"
  device_slug: "guition-esp32-p4-jc1060p470"
  firmware_manifest_slug: "guition-esp32-p4-jc1060p470"
  firmware_version: "dev"
  screen_width: "1024"
  screen_height: "600"
  content_width: "550"
  setup_icon_font_id: font_icon_main
  setup_title_font_id: font_text_title
  setup_body_font_id: font_text_body
  setup_pad_row: "20"
  setup_loading_pad_row: "40"
  setup_action_button_width: "200"
  setup_action_button_height: "56"
  setup_action_button_radius: "12"
  icon_font: font_icon_main
  subpage_chevron_font: font_icon_status
  label_font: font_text_body
  media_title_font: font_text_title
  unit_font: font_text_body
  sensor_value_font: font_number_value
  padding: 16px
  radius: 10px
  main_page_card_gap: "10"
  main_page_pad_top: "42"
  main_page_compact_pad_top: "5"
  clock_bar_item_gap: "80"
  clock_bar_visual_gap: "10"
  voice_clock_bar_hide_code: ""
  voice_clock_bar_apply_code: ""
  navigate_voice_target_code: |-
    ESP_LOGW("navigation", "Voice volume target is not available on this device");
  voice_interaction_active_condition: "false"
  clock_font_size: "200"
  clock_cx: "512"
  clock_cy: "300"
  screen_saver_clock_min_brightness: "1"
  screen_saver_clock_default_brightness: "35"
  screen_schedule_clock_min_brightness: "1"
  screen_schedule_clock_default_brightness: "10"
  network_transport: "wifi"
  disable_updates: "false"
  network_package_suffix: ${ "_ethernet" if network_transport == "ethernet" else "" }
  firmware_update_package_suffix: ${ "_disabled" if disable_updates == "true" else "" }
  esp32_c6_firmware_update_package_suffix: ${ "_disabled" if network_transport == "ethernet" else "" }
  backlight_pwm_frequency: ${ "20000Hz" if network_transport == "ethernet" else "1000Hz" }
  cover_art_size: "600"
  cover_art_decode_size: "600"
  cover_art_x: "0"
  cover_art_y: "0"
  cover_art_accent_x: "585"
  cover_art_accent_y: "0"
  cover_art_accent_width: "439"
  cover_art_accent_height: "600"
  cover_art_accent_bg_opa: "100%"
  cover_art_accent_opa: "100%"
  cover_art_panel_x: "615"
  cover_art_panel_y: "34"
  cover_art_panel_width: "377"
  cover_art_panel_height: "430"
  cover_art_panel_pad_top: "0"
  cover_art_panel_pad_bottom: "0"
  cover_art_panel_pad_left: "0"
  cover_art_panel_pad_right: "0"
  cover_art_panel_pad_row: "0"
  cover_art_title_font: "font_cover_art_title"
  cover_art_title_max_height: "260"
  cover_art_title_line_space: "-8"
  cover_art_artist_font: "font_cover_art_artist"
  cover_art_artist_pad_top: "10"
  cover_art_artist_long_mode: "dot"
  cover_art_time_font: "font_cover_art_time"
  cover_art_time_pad_top: "14"
  cover_art_progress_width: "1024"
  cover_art_progress_height: "4"
  cover_art_text_color: "0xFFFFFF"
  cover_art_square_overlay: "false"
  cover_art_live_image_updates: "false"

packages:
  # ---------------------------------------------------------------------------
  # Device, assets, and LVGL base
  # ---------------------------------------------------------------------------
  entity_names:    !include ../../common/config/entity_names.yaml
  device:          !include device/device.yaml
  network_coprocessor: !include device/network_coprocessor${network_package_suffix}.yaml
  esp32_c6_firmware_update: !include ../../common/device/esp32_c6_firmware_update${esp32_c6_firmware_update_package_suffix}.yaml
  icons:           !include ../../common/assets/icons.yaml
  fonts_device:    !include device/fonts.yaml
  button_theme:    !include ../../common/theme/button.yaml
  # ---------------------------------------------------------------------------
  # Configuration (text/select/number components for web UI)
  # ---------------------------------------------------------------------------
  colors:          !include ../../common/config/colors.yaml
  button_order:    !include ../../common/config/button_order.yaml
  display_config:  !include ../../common/config/display.yaml
  # BEGIN GENERATED BUTTON PACKAGES
  # Generated by scripts/generate_device_slots.py from devices/manifest.json.
  # Per-button entity/label/icon (15 slots - 3x5 grid)
  btn_1:           !include { file: ../../common/config/button_template.yaml, vars: { num: "1" } }
  btn_2:           !include { file: ../../common/config/button_template.yaml, vars: { num: "2" } }
  btn_3:           !include { file: ../../common/config/button_template.yaml, vars: { num: "3" } }
  btn_4:           !include { file: ../../common/config/button_template.yaml, vars: { num: "4" } }
  btn_5:           !include { file: ../../common/config/button_template.yaml, vars: { num: "5" } }
  btn_6:           !include { file: ../../common/config/button_template.yaml, vars: { num: "6" } }
  btn_7:           !include { file: ../../common/config/button_template.yaml, vars: { num: "7" } }
  btn_8:           !include { file: ../../common/config/button_template.yaml, vars: { num: "8" } }
  btn_9:           !include { file: ../../common/config/button_template.yaml, vars: { num: "9" } }
  btn_10:          !include { file: ../../common/config/button_template.yaml, vars: { num: "10" } }
  btn_11:          !include { file: ../../common/config/button_template.yaml, vars: { num: "11" } }
  btn_12:          !include { file: ../../common/config/button_template.yaml, vars: { num: "12" } }
  btn_13:          !include { file: ../../common/config/button_template.yaml, vars: { num: "13" } }
  btn_14:          !include { file: ../../common/config/button_template.yaml, vars: { num: "14" } }
  btn_15:          !include { file: ../../common/config/button_template.yaml, vars: { num: "15" } }
  # END GENERATED BUTTON PACKAGES
  # ---------------------------------------------------------------------------
  # Addons
  # ---------------------------------------------------------------------------
  connectivity:    !include ../../common/addon/connectivity${network_package_suffix}.yaml
  api_navigate:    !include ../../common/device/api_navigate.yaml
  time_sync:       !include ../../common/addon/time.yaml
  backlight:       !include ../../common/addon/backlight.yaml
  bl_schedule:     !include ../../common/addon/backlight_schedule.yaml
  network:         !include ../../common/addon/network${network_package_suffix}.yaml
  memory_diag:     !include ../../common/addon/memory_diagnostics.yaml
  fw_update:       !include ../../common/addon/firmware_update${firmware_update_package_suffix}.yaml

  # ---------------------------------------------------------------------------
  # Screens (loading must be first page for LVGL startup)
  # ---------------------------------------------------------------------------
  screen_loading:  !include ../../common/device/screen_loading${network_package_suffix}.yaml
  screen_network:  !include ../../common/device/screen_${network_transport}_setup.yaml
  screen_ha:       !include ../../common/device/screen_ha_setup.yaml
  screen_ha_act:   !include ../../common/device/screen_ha_actions.yaml
  screen_setup:    !include ../../common/device/screen_button_setup.yaml
  screen_clock:    !include ../../common/device/screen_clock.yaml
  screen_art:      !include ../../common/device/screen_cover_art.yaml
  image_cards:     !include ../../common/device/image_cards_6.yaml
  # ---------------------------------------------------------------------------
  # Main page and dynamic sensor subscriptions (after setup screens)
  # ---------------------------------------------------------------------------
  lvgl:            !include device/lvgl.yaml
  sensors:         !include device/sensors.yaml
