# =============================================================================
# ESPHOME ENTRY POINT - Guition ESP32-P4 JC1060P470
# =============================================================================
# User-facing config file. Set your device name and network transport here.
# The remote package reference pulls in the full device configuration from
# GitHub so the device stays up-to-date automatically.
# =============================================================================

# ---------------------------------------------------------------------------
# Device identity
# ---------------------------------------------------------------------------
substitutions:
  name: "your-device-name"
  friendly_name: "Your Device Name"
  # Set this to "ethernet" for the built-in wired Ethernet port.
  # Ethernet builds disable EspControl firmware updates because the release
  # manifest only provides the standard WiFi firmware for this device.
  network_transport: "wifi"
  disable_updates: ${ "true" if network_transport == "ethernet" else "false" }
  starter_network_package_suffix: ${ "_ethernet" if network_transport == "ethernet" else "" }

# ---------------------------------------------------------------------------
# Starter network package and remote package
# ---------------------------------------------------------------------------
packages:
  # WiFi builds include credentials from secrets.yaml. Ethernet builds include
  # an empty placeholder so WiFi is not added alongside Ethernet.
  network_credentials: !include device/starter_network${starter_network_package_suffix}.yaml
  setup:
    url: https://github.com/jtenniswood/espcontrol/
    file: devices/guition-esp32-p4-jc1060p470/packages.yaml
    refresh: 1s
