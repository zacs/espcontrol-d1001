# =============================================================================
# DEVICE - Guition ESP32-S3-4848S040 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" square panel.
# Includes the ESP32-S3 SoC (native WiFi), MIPI RGB display, GT911
# capacitive touchscreen, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      # The S3 display stack leaves little internal RAM for HTTPS OTA checks.
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Keep the ESP32 task watchdog long enough for display startup while
      # remaining compatible with ESPHome 2026.4 and newer.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      # Keep WiFi startup inside the internal-RAM budget after the RGB display
      # and LVGL buffers are initialized.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and MIPI RGB display fails to reinitialize
# peripherals after a software reset. A brief deep sleep forces a full
# hardware reset on wake, equivalent to a power cycle. The on_boot
# handler catches USB-triggered and software-triggered resets (the
# latter fired by the "Apply Configuration" restart button); the OTA
# on_end hook catches wireless updates.
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-DESPCONTROL_DISABLE_TODO=1"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Delaying deep-sleep reset until OTA image is marked valid");
                id(post_ota_hardware_reset).execute();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: 700
      then:
        - lambda: |-
            register_internal_relay(
              "relay_1", "Relay 1",
              [=](bool on) {
                if (on) id(relay_1).turn_on();
                else id(relay_1).turn_off();
              },
              [=]() { id(relay_1_push).execute(); },
              [=]() -> bool { return id(relay_1).state; });
            register_internal_relay(
              "relay_2", "Relay 2",
              [=](bool on) {
                if (on) id(relay_2).turn_on();
                else id(relay_2).turn_off();
              },
              [=]() { id(relay_2_push).execute(); },
              [=]() -> bool { return id(relay_2).state; });
            register_internal_relay(
              "relay_3", "Relay 3",
              [=](bool on) {
                if (on) id(relay_3).turn_on();
                else id(relay_3).turn_off();
              },
              [=]() { id(relay_3_push).execute(); },
              [=]() -> bool { return id(relay_3).state; });
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: s3_4848s040_safe_mode
  boot_is_good_after: 10s

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# The S3 panel runs close to the internal RAM limit once the RGB display,
# LVGL, web UI, and API are all active. Keep the native API connection pool
# modest, but allow one spare slot so Home Assistant can reconnect after an
# abrupt OTA reset while the ESPHome dashboard/logger still has a socket open.
# Give the send queue extra headroom so reconnect bursts and compact Home
# Assistant action responses do not drop the API connection on this low-memory
# panel.
api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

# The 4848S040 USB-C port is exposed as UART0 through a USB-UART bridge.
# GPIO19/20 are used by the touchscreen/display path, so USB_SERIAL_JTAG
# stops working once the application starts.
logger:
  hardware_uart: UART0

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return !id(display_asleep) &&
                       !id(screen_schedule_asleep) &&
                       !id(screensaver_display_off_active) &&
                       !id(screensaver_dimmed_active);
            then:
              - script.execute: screen_schedule_manual_sleep

# ---------------------------------------------------------------------------
# Built-in relays (4848S040C relay variant)
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    name: Relay 1
    id: relay_1
    icon: mdi:electric-switch
    pin:
      number: GPIO40
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", false);'

  - platform: gpio
    name: Relay 2
    id: relay_2
    icon: mdi:electric-switch
    pin:
      number: GPIO2
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", false);'

  - platform: gpio
    name: Relay 3
    id: relay_3
    icon: mdi:electric-switch
    pin:
      number: GPIO1
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_3", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_3", false);'

# Momentary relay buttons for push-button/dimmer inputs.
button:
  - platform: template
    name: Relay 1 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_1_push

  - platform: template
    name: Relay 2 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_2_push

  - platform: template
    name: Relay 3 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_3_push

# ---------------------------------------------------------------------------
# SPI bus (used by MIPI RGB driver for ST7701S init sequence)
# ---------------------------------------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    update_interval: 16ms
    transform:
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4" 480x480 MIPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: GUITION-4848S040
    id: my_display
    # Start WiFi before the RGB panel allocates its frame buffers; otherwise the
    # WiFi driver can fail to claim enough internal RX buffers on fresh boots.
    setup_priority: 240
    pclk_frequency: 8MHz
    update_interval: never
    auto_clear_enabled: False
    # Keep the ST7701S panel init sequence on the non-mirrored path. The
    # ESPHome model default mirrors this panel, which causes visible scan-line
    # streaking on some 4848S040 units during LVGL updates.
    transform:
      mirror_x: false
      mirror_y: false

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  # Keep LVGL after WiFi and after the display driver.
  setup_priority: 230
  buffer_size: 12%
  displays: my_display
  rotation: 180
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: post_ota_hardware_reset
    mode: single
    then:
      # Safe Mode marks the new OTA image valid after 10s. Wait a little
      # longer, then perform the hardware-reset workaround for this S3 panel.
      - delay: 15s
      - lambda: |-
          ESP_LOGI("s3_reset", "Performing delayed post-OTA deep-sleep reset");
          esp_sleep_enable_timer_wakeup(100000);
          esp_deep_sleep_start();

  - id: relay_1_push
    mode: restart
    then:
      - switch.turn_on: relay_1
      - delay: 200ms
      - switch.turn_off: relay_1

  - id: relay_2_push
    mode: restart
    then:
      - switch.turn_on: relay_2
      - delay: 200ms
      - switch.turn_off: relay_2

  - id: relay_3_push
    mode: restart
    then:
      - switch.turn_on: relay_3
      - delay: 200ms
      - switch.turn_off: relay_3

  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 270
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 0
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 90
                      else:
                        - lvgl.display.set_rotation: 180

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "180"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
