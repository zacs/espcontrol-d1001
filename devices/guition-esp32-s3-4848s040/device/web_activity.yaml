# =============================================================================
# WEB ACTIVITY - Show S3 web settings status while the web UI is active
# =============================================================================
# The S3 has much less spare memory than the P4 displays. When a browser opens
# the local web settings page, the web UI presses these internal buttons so the
# device can show a low-brightness status message and release downloaded images.
# =============================================================================

globals:
  - id: web_settings_active
    type: bool
    initial_value: 'false'
  - id: web_settings_was_display_asleep
    type: bool
    initial_value: 'false'

button:
  - platform: template
    name: "Web Settings Heartbeat"
    id: web_settings_heartbeat_button
    internal: true
    on_press:
      - script.execute: web_settings_heartbeat

  - platform: template
    name: "Web Settings Closed"
    id: web_settings_closed_button
    internal: true
    on_press:
      - script.stop: web_settings_activity_timeout
      - script.execute: exit_web_settings_mode

script:
  - id: web_settings_heartbeat
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(web_settings_active);'
          then:
            - script.execute: enter_web_settings_mode
      - script.execute: web_settings_activity_timeout
      - output.turn_on: gpio_backlight_pwm
      - output.set_level:
          id: gpio_backlight_pwm
          level: 15%

  - id: web_settings_activity_timeout
    mode: restart
    then:
      - delay: 25s
      - script.execute: exit_web_settings_mode

  - id: enter_web_settings_mode
    mode: restart
    then:
      - lambda: |-
          id(web_settings_active) = true;
          id(web_settings_was_display_asleep) = id(display_asleep);
          id(home_screen_idle_suspended) = true;
      - script.stop: home_screen_idle_check
      - script.stop: screensaver_sleep_timer
      - script.stop: screensaver_sleep_sensor
      - script.stop: screensaver_sleep_display_off
      - script.stop: screen_schedule_sleep
      - script.stop: backlight_fade_current_ui_to_black
      - script.stop: backlight_sleep_display_off
      - script.stop: backlight_schedule_display_off
      - script.stop: show_clock_view
      - script.stop: show_cover_art_view
      - script.stop: cover_art_delay_timer
      - script.stop: cover_art_show_track_overlay
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
      - script.execute: hide_clock_view
      - script.execute: hide_cover_art_view
      - lvgl.widget.hide: dim_screensaver_touch_guard
      - lvgl.page.show: web_settings_active_page
      - script.execute: clock_bar_hide
      - lvgl.widget.redraw:
      - delay: 50ms
      - output.turn_on: gpio_backlight_pwm
      - output.set_level:
          id: gpio_backlight_pwm
          level: 15%
      - artwork_image.release: cover_art_downloaded_image
      - output.set_level:
          id: gpio_backlight_pwm
          level: 15%

  - id: exit_web_settings_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(web_settings_active);'
          then:
            - lambda: |-
                id(web_settings_active) = false;
                id(home_screen_idle_suspended) = false;
            - if:
                condition: lvgl.is_paused
                then:
                  - lvgl.resume:
            - if:
                condition:
                  lambda: 'return id(web_settings_was_display_asleep);'
                then:
                  - script.execute: backlight_sleep_display_off
                else:
                  - lvgl.widget.hide: dim_screensaver_touch_guard
                  - lvgl.page.show: main_page
                  - script.execute: backlight_apply_brightness
                  - script.execute: home_screen_idle_check
            - lambda: |-
                if (id(ink_ha_connected).state) refresh_image_cards();
