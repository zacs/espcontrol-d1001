            cfg.subpage_chevron_y = -2;
            cfg.subpage_chevron_text_width_percent = 96;
            cfg.modal_profile.layout_family = DisplayModalLayoutFamily::COMPACT_SQUARE;
            cfg.modal_profile.density = DisplayModalDensity::COMPACT;
            cfg.modal_profile.memory_tier = DisplayModalMemoryTier::CONSTRAINED;
            cfg.modal_profile.base_touch_target = 46;
            cfg.icon_font = id(font_icon_main)->get_lv_font();
            cfg.sp_sensor_font = id(font_number_value)->get_lv_font();
            cfg.sp_large_sensor_font = id(font_number_value_large)->get_lv_font();
            cfg.large_sensor_unit_offset_percent = -10;
            cfg.media_title_font = id(font_text_title)->get_lv_font();
            cfg.media_control_title_font = id(font_media_control_title)->get_lv_font();
            cfg.media_cover_art_title_font = id(font_cover_art_title)->get_lv_font();
            cfg.media_cover_art_artist_font = id(font_cover_art_artist)->get_lv_font();
            cfg.volume_number_font = id(font_number_value_large)->get_lv_font();
            cfg.volume_label_font = id(font_text_body)->get_lv_font();
            cfg.climate_card_icon_font = id(font_icon_card)->get_lv_font();
            cfg.subpage_chevron_font = id(font_icon_status)->get_lv_font();
            cfg.climate_option_title_font = id(font_text_body)->get_lv_font();
            cfg.climate_option_value_font = id(font_text_body)->get_lv_font();
            cfg.temperature_unit = id(temperature_unit_select).current_option();
            cfg.timezone = id(timezone_select).current_option();
            cfg.begin_display_takeover = [](espcontrol::DisplayTakeoverKind kind) {
              id(display_takeover_begin).execute(static_cast<int>(kind));
            };
            cfg.end_display_takeover = [](espcontrol::DisplayTakeoverKind kind) {
              id(display_takeover_end).execute(static_cast<int>(kind));
            };
            static esphome::artwork_image::ArtworkImage *image_card_downloaders[] = {
              id(image_card_download_1),
            };
            cfg.image_card_images = image_card_downloaders;
            cfg.image_card_modal_image = id(image_card_modal_download_1);
            cfg.image_card_image_count = 1;
            cfg.home_assistant_base_url = []() {
              std::string base = id(cover_art_home_assistant_base_url);
              while (!base.empty() && base.back() == '/') base.pop_back();
              return base;
            };
            register_webhook_sender([](const std::string &url, const std::string &method, const std::string &body, const std::vector<esphome::http_request::Header> &headers) {
              auto response = id(http_req).start(url, method, body, headers);
              if (response == nullptr) {
                ESP_LOGW("webhook", "Webhook request failed to start: %s", url.c_str());
                return false;
              }
              int status = response->status_code;
              response->end();
              if (!esphome::http_request::is_success(status)) {
                ESP_LOGW("webhook", "Webhook %s returned HTTP %d", url.c_str(), status);
                return false;
              }
              ESP_LOGI("webhook", "Webhook %s returned HTTP %d", url.c_str(), status);
              return true;
            });
            set_width_compensation_vertical_axis(cfg.width_compensation_vertical);
            apply_width_compensation(id(display_time), cfg.width_compensation_percent);
            apply_width_compensation(id(temperatures), cfg.width_compensation_percent);
            apply_width_compensation(id(clock_label), cfg.width_compensation_percent);
            // END GENERATED PHASE 1 GRID WIRING
            grid_phase1(slots, cfg,
              id(button_order).state,
              id(button_on_color).state,
              id(main_page)->obj);
        - delay: 100ms

        # Phase 2: HA subscriptions + subpage creation
        - lambda: |-
            // BEGIN GENERATED PHASE 2 GRID WIRING
            // Generated by scripts/generate_device_slots.py from devices/manifest.json.
            #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label, button_##n##_subpage_label }
            #define SP_CFG(n) subpage_##n##_config
            #define SP_EXT(n) subpage_##n##_config_ext
            #define SP_EXT2(n) subpage_##n##_config_ext_2
            #define SP_EXT3(n) subpage_##n##_config_ext_3
            BtnSlot slots[] = {
              BTN_SLOT(1),
              BTN_SLOT(2),
              BTN_SLOT(3),
              BTN_SLOT(4),
              BTN_SLOT(5),
              BTN_SLOT(6),
              BTN_SLOT(7),
              BTN_SLOT(8),
              BTN_SLOT(9),
            };
            esphome::text::Text *sp_cfgs[] = {
              SP_CFG(1), SP_CFG(2), SP_CFG(3), SP_CFG(4),
              SP_CFG(5), SP_CFG(6), SP_CFG(7), SP_CFG(8),
              SP_CFG(9),
            };
            esphome::text::Text *sp_ext[] = {
              SP_EXT(1), SP_EXT(2), SP_EXT(3), SP_EXT(4),
              SP_EXT(5), SP_EXT(6), SP_EXT(7), SP_EXT(8),
              SP_EXT(9),
            };
            esphome::text::Text *sp_ext2[] = {
              SP_EXT2(1), SP_EXT2(2), SP_EXT2(3), SP_EXT2(4),
              SP_EXT2(5), SP_EXT2(6), SP_EXT2(7), SP_EXT2(8),
              SP_EXT2(9),
            };
            esphome::text::Text *sp_ext3[] = {
              SP_EXT3(1), SP_EXT3(2), SP_EXT3(3), SP_EXT3(4),
              SP_EXT3(5), SP_EXT3(6), SP_EXT3(7), SP_EXT3(8),
              SP_EXT3(9),
            };
            #undef BTN_SLOT
            #undef SP_CFG
            #undef SP_EXT
            #undef SP_EXT2
            #undef SP_EXT3
            GridConfig cfg = {};
            cfg.num_slots = 9;
            cfg.cols = 3;
            cfg.subpage_chevrons_enabled = id(subpage_chevrons_enabled).state;
            cfg.subpage_chevron_x = 3;
            cfg.subpage_chevron_y = -2;
            cfg.subpage_chevron_text_width_percent = 96;
            cfg.modal_profile.layout_family = DisplayModalLayoutFamily::COMPACT_SQUARE;
            cfg.modal_profile.density = DisplayModalDensity::COMPACT;
            cfg.modal_profile.memory_tier = DisplayModalMemoryTier::CONSTRAINED;
            cfg.modal_profile.base_touch_target = 46;
            cfg.icon_font = id(font_icon_main)->get_lv_font();
            cfg.sp_sensor_font = id(font_number_value)->get_lv_font();
            cfg.sp_large_sensor_font = id(font_number_value_large)->get_lv_font();
            cfg.large_sensor_unit_offset_percent = -10;
            cfg.media_title_font = id(font_text_title)->get_lv_font();
            cfg.media_control_title_font = id(font_media_control_title)->get_lv_font();
            cfg.media_cover_art_title_font = id(font_cover_art_title)->get_lv_font();
            cfg.media_cover_art_artist_font = id(font_cover_art_artist)->get_lv_font();
            cfg.volume_number_font = id(font_number_value_large)->get_lv_font();
            cfg.volume_label_font = id(font_text_body)->get_lv_font();
            cfg.climate_card_icon_font = id(font_icon_card)->get_lv_font();
            cfg.subpage_chevron_font = id(font_icon_status)->get_lv_font();
            cfg.climate_option_title_font = id(font_text_body)->get_lv_font();
            cfg.climate_option_value_font = id(font_text_body)->get_lv_font();
            cfg.temperature_unit = id(temperature_unit_select).current_option();
            cfg.timezone = id(timezone_select).current_option();
            cfg.begin_display_takeover = [](espcontrol::DisplayTakeoverKind kind) {
              id(display_takeover_begin).execute(static_cast<int>(kind));
            };
            cfg.end_display_takeover = [](espcontrol::DisplayTakeoverKind kind) {
              id(display_takeover_end).execute(static_cast<int>(kind));
            };
            static esphome::artwork_image::ArtworkImage *image_card_downloaders[] = {
              id(image_card_download_1),
            };
            cfg.image_card_images = image_card_downloaders;
            cfg.image_card_modal_image = id(image_card_modal_download_1);
            cfg.image_card_image_count = 1;
            cfg.home_assistant_base_url = []() {
              std::string base = id(cover_art_home_assistant_base_url);
              while (!base.empty() && base.back() == '/') base.pop_back();
              return base;
            };
            register_webhook_sender([](const std::string &url, const std::string &method, const std::string &body, const std::vector<esphome::http_request::Header> &headers) {
              auto response = id(http_req).start(url, method, body, headers);
              if (response == nullptr) {
                ESP_LOGW("webhook", "Webhook request failed to start: %s", url.c_str());
                return false;
              }
              int status = response->status_code;
              response->end();
              if (!esphome::http_request::is_success(status)) {
                ESP_LOGW("webhook", "Webhook %s returned HTTP %d", url.c_str(), status);
                return false;
              }
              ESP_LOGI("webhook", "Webhook %s returned HTTP %d", url.c_str(), status);
              return true;
            });
            set_width_compensation_vertical_axis(cfg.width_compensation_vertical);
            apply_width_compensation(id(display_time), cfg.width_compensation_percent);
            apply_width_compensation(id(temperatures), cfg.width_compensation_percent);
            apply_width_compensation(id(clock_label), cfg.width_compensation_percent);
            // END GENERATED PHASE 2 GRID WIRING
            grid_phase2(slots, cfg, sp_cfgs, sp_ext, sp_ext2, sp_ext3,
              id(button_order).state,
              id(button_on_color).state,
              id(main_page)->obj);
        - script.execute: clock_bar_apply
        - script.execute: time_update
        - delay: 100ms

        # Phase 3: Temperature + presence subscriptions
        - lambda: |-
            lv_obj_t *temperature_labels[] = {
              id(temperatures),
            };
            grid_phase3(
              id(indoor_temp_enable).state,
              id(outdoor_temp_enable).state,
              id(indoor_temp_entity).state,
              id(outdoor_temp_entity).state,
              id(clock_bar_temperature_entities).state,
              &id(indoor_temp), &id(outdoor_temp),
              temperature_labels,
              1,
              id(main_page)->obj,
              id(presence_sensor_entity).state,
              &id(presence_detected),
              id(media_player_sleep_prevention_entity).state,
              &id(media_player_playing),
              []() {
                return clock_bar_should_show(
                    id(clock_bar_enabled).state,
                    id(main_page)->obj,
                    id(display_mode_controller).current_mode(),
                    id(display_mode_controller).target_schedule_inactive());
              },
              []() {
                id(screensaver_presence_wake).execute();
              },
              []() {
                id(screensaver_presence_sleep).execute();
              },
              []() {
                return id(outdoor_temp_enable).state;
              });
        - delay: 500ms
        - script.execute: refresh_button_grid
        - delay: 1500ms
        - script.execute: refresh_button_grid
