# =============================================================================
# DEVICE - Seeed reTerminal D1001 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 8" touch panel.
# Includes the ESP32-P4 main SoC, ESP32-C6 hosted WiFi co-processor, MIPI
# DSI display (JD9365), GSL3670 capacitive touchscreen, an XL9535/PCA9535 I2C
# GPIO expander (display power/reset/backlight-enable + power latch), and
# backlight PWM. Pin map and power-up sequence follow Seeed's reTerminal D1001
# BSP (github.com/Seeed-Studio/reTerminal-D1001).
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/zacs/espcontrol-d1001"
  espcontrol_component_ref: "main"
  mdi_font_file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"

# ---------------------------------------------------------------------------
# ESP32-P4 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    # stick to recommended version, currently 5.5.4, 55.03.39 with tool-esptoolpy 5.3.0. No issues
    #version: 5.5.2
    # pioarduino 55.03.38-1 pulls tool-esptoolpy 5.2.0, which can install
    # incompletely in ESPHome containers and then fail while creating .bin files.
    #platform_version: 55.03.37
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
      disable_vfs_support_termios: false
      disable_vfs_support_select: false
      disable_vfs_support_dir: false
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      # HTTPS firmware checks need more stack on ESP32-P4; the default main
      # task stack can trip the stack protector during mbedTLS setup.
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Native OTA and display startup can block loopTask briefly on this
      # panel. Use the ESP-IDF maximum so those longer operations can finish.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      # The P4 firmware image is large enough that yielding during every
      # flash erase can make native OTA preparation exceed ESPHome's uploader
      # timeout before the progress bar starts.
      CONFIG_SPI_FLASH_YIELD_DURING_ERASE: "n"
      # ESPHome 2026.5 / ESP-IDF 5.5.2 can make ESP-Hosted preallocate a
      # large internal DMA buffer pool before ESPHome starts. On P4 display
      # builds this can fail with "HS_MP: mempool create failed: no mem" and
      # trigger OTA rollback, so use dynamic buffers and keep hosted task
      # stacks in PSRAM.
      CONFIG_ESP_HOSTED_USE_MEMPOOL: "n"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

# ---------------------------------------------------------------------------
# External components
# ---------------------------------------------------------------------------
external_components:
  # gsl3670 is the GSL3670 capacitive touch driver (GPLv2, Silead), vendored in
  # components/gsl3670 with its own LICENSE.md — same in-tree pattern as gsl3680.
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image, gsl3670]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-Wno-deprecated-declarations"
      - "-DESPCONTROL_DISABLE_TODO=1"
      # Force PlatformIO to rebuild cached ESPHome objects after the 2026.5
      # core/scheduler/watchdog changes; stale 2026.4 objects can boot-loop.
      - "-DESPCONTROL_ESPHOME_2026_5_REBUILD=1"
      # Keep LVGL active while the backlight is off so the GSL3670 touch
      # controller can still deliver the wake tap from display-off screensaver.
      - "-DESPCONTROL_KEEP_LVGL_ACTIVE_ON_DISPLAY_OFF=1"
      # Build marker for the initial reTerminal D1001 bring-up.
      - "-DESPCONTROL_RETERMINAL_D1001_BOOTFIX_20260607=1"
    build_src_flags:
      - "-Wno-literal-suffix"
  on_boot:
    - priority: 260
      then:
        - if:
            condition:
              lambda: |-
                #ifdef USE_ESP32_CRASH_HANDLER
                return esphome::esp32::crash_handler_has_data();
                #else
                return false;
                #endif
            then:
              - lambda: |-
                  #ifdef USE_ESP32_CRASH_HANDLER
                  esphome::esp32::crash_handler_clear();
                  #endif
                  id(reterminal_d1001_safe_mode).mark_successful();
                  global_preferences->sync();
                  ESP_LOGW("reterminal_d1001", "Cleared saved crash report before API logging; rebooting once");
              - delay: 500ms
              - lambda: |-
                  App.safe_reboot();
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# ESP32-C6 co-processor (provides WiFi/BLE via SDIO)
# ---------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO13
  cmd_pin: GPIO6
  clk_pin: GPIO11
  d0_pin: GPIO7
  d1_pin: GPIO8
  d2_pin: GPIO9
  d3_pin: GPIO10
  active_high: true
  sdio_frequency: 20MHz

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: reterminal_d1001_safe_mode

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# ---------------------------------------------------------------------------
# Power management (internal LDO channel 3 = the 2.5V MIPI D-PHY rail).
#
# On the ESP32-P4 the MIPI-DSI (display) and MIPI-CSI (camera) PHYs share this
# one internal LDO. It MUST be acquired as a FIXED channel, not adjustable: an
# adjustable channel is exclusive to a single owner, so with adjustable: true
# the camera's CSI PHY cannot bring the rail up and esp_video fails with
# "esp_ldo_acquire_channel: already in use by others or not adjustable". A
# fixed channel is reference-counted and shareable, and esp_video's csi driver
# acquires the same channel 3 @ 2500mV as fixed, so both PHYs coexist. The
# display only needs a stable 2.5V here, so fixed costs nothing.
# ---------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: False

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO14
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(display_mode_controller).target_source_is(
                            espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                        id(display_mode_controller).target_mode_is(
                            espcontrol::DisplayMode::DISPLAY_OFF)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(display_mode_controller).current_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF);
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - if:
            condition:
              lambda: |-
                return id(display_mode_controller).takeover_active(
                           espcontrol::DisplayTakeoverKind::INTERACTIVE) ||
                       id(display_mode_controller).takeover_active(
                           espcontrol::DisplayTakeoverKind::CRITICAL);
            then:
              - lambda: 'ESP_LOGD("backlight", "Restoring backlight after OFF event during display takeover");'
              - delay: 10ms
              - script.execute: backlight_apply_brightness
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(display_mode_controller).target_mode_is(
                          espcontrol::DisplayMode::ACTIVE);
                  then:
                    - script.execute: screen_schedule_manual_sleep

# ---------------------------------------------------------------------------
# I2C buses (per the reTerminal D1001 I2C tree in the schematic)
#   bus_touch    - I2C0 (GPIO37/38): GSL3670 touch (0x40) + camera SCCB (0x26)
#   bus_expander - I2C1 (GPIO20/21): XL9535 GPIO expander (0x20), ES8311 codec
#                  (0x18), ES7210 ADC (0x40), RTC (0x51), 6DoF (0x6A), charger
#                  (0x6B)
# ---------------------------------------------------------------------------
i2c:
  - id: bus_touch
    sda: GPIO37
    scl: GPIO38
    frequency: 400kHz
  - id: bus_expander
    sda: GPIO20
    scl: GPIO21
    frequency: 400kHz

# ---------------------------------------------------------------------------
# GPIO expander (XL9535/PCA9535). Drives the display power/reset/backlight
# enable lines (used by the mipi_dsi model below) and the soft-power latch.
# ---------------------------------------------------------------------------
xl9535:
  - id: xl9535_hub
    i2c_id: bus_expander
    address: 0x20

# ---------------------------------------------------------------------------
# Soft-power latch. The reTerminal D1001 gates its 3.3V rail behind the
# expander's PWR_HOLD line; it must be driven high at boot to keep the board
# powered, matching bsp_power_init() in Seeed's BSP. The BSP addresses it as
# bit 8; ESPHome's xl9535 numbers the second port 10-17, so bit 8 is pin 10.
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    id: power_hold
    internal: true
    restore_mode: ALWAYS_ON
    pin:
      xl9535: xl9535_hub
      number: 10

# ---------------------------------------------------------------------------
# Physical button (GPIO3). Active-high with an external pull-down, matching
# the reTerminal D1001 BSP (active_level=1, disable_pull=true). Exposed to
# Home Assistant for automations; EspControl takes no local action on it.
# ---------------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    name: Button
    id: physical_button
    icon: mdi:gesture-tap-button
    pin:
      number: GPIO3
      mode:
        input: true
        pulldown: true

# ---------------------------------------------------------------------------
# Touchscreen (GSL3670 capacitive, wakes screensaver on touch).
#
# The GSL3670 shares I2C0 (bus_touch, GPIO37/38) with the camera SCCB, per the
# reTerminal D1001 I2C tree (touch 0x40, camera 0x26). Its reset line, TP_RST,
# is on the XL9535 expander. Seeed's BSP defines BSP_LCD_TOUCH_RST = 1<<12
# (expander bit 12); ESPHome numbers the second port 10-17, so expander bit 12
# is xl9535 pin 14 (bit 9 CAM_RST -> pin 11, bit 8 PWR_HOLD -> pin 10 confirm
# the +2 offset). The BSP leaves this line's reset call commented out, so it
# normally floats; on this panel it settles low, holding the GSL3670 in reset
# so it never ACKs and setup fails with "I2C Error: 2" (absent from the bus
# scan). Drive it high here to bring the controller out of reset. This also
# keeps touch deterministic once the camera (person detection) is brought up on
# the shared bus and drives the neighbouring expander pins.
# ---------------------------------------------------------------------------
touchscreen:
  - platform: gsl3670
    id: my_touchscreen
    i2c_id: bus_touch
    interrupt_pin: GPIO16
    reset_pin:
      xl9535: xl9535_hub
      number: 14
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    # Restart the cover-art "Show After" delay on every touch (upstream
    # requirement) before waking, so cover art doesn't immediately reappear.
    on_touch:
      - script.execute: cover_art_pause_after_touch
      - script.wait: cover_art_pause_after_touch
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (8" 800x1280 native MIPI DSI panel, JD9365). Display power, reset,
# and backlight-enable are driven through the XL9535 expander, per the
# built-in SEEED-RETERMINAL-D1001 model.
# ---------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: SEEED-RETERMINAL-D1001
    color_order: RGB
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 1280
    enable_pin:
      - xl9535: xl9535_hub
        number: 0
      - xl9535: xl9535_hub
        number: 7
    reset_pin:
      xl9535: xl9535_hub
      number: 2

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  displays: my_display
  rotation: 90
  byte_order: little_endian
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 180
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 270
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 0
                      else:
                        - lvgl.display.set_rotation: 90
      - script.execute: cover_art_apply_responsive_layout

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "180"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
              - script.execute: refresh_button_grid
