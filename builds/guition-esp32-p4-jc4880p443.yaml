# =============================================================================
# BUILD PROFILE - Guition ESP32-P4 JC4880P443 (4.3" portrait)
# =============================================================================
# CI/local build entry point for the 480x800 portrait panel.
# Bundles the matching web UI so branch/release builds do not load the shared
# GitHub Pages copy from main.
# =============================================================================

substitutions:
  cover_art_placeholder_file: "../common/assets/cover_art_placeholder.svg"
  name: "espcontrol-jc4880p443"
  friendly_name: "EspControl 4inch"
  espcontrol_component_url: "file:///config"
  mdi_font_file: "/config/common/assets/fonts/materialdesignicons-webfont-7.4.47.ttf"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/guition-esp32-p4-jc4880p443/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:

web_server:
  js_url: ""
  js_include: "../docs/public/webserver/guition-esp32-p4-jc4880p443/www.js"
