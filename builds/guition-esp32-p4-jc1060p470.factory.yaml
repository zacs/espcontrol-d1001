# =============================================================================
# FACTORY BUILD - Guition ESP32-P4 JC1060P470 (7" landscape)
# =============================================================================
# Factory image variant: bundles www.js inline (js_include) instead of loading
# from GitHub CDN, so the web UI works on first boot before WiFi is configured.
# firmware_version is overridden by the release workflow at build time.
# dashboard_import enables one-click adoption in ESPHome Dashboard.
# =============================================================================

substitutions:
  cover_art_placeholder_file: "../common/assets/cover_art_placeholder.svg"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  mdi_font_file: "/config/common/assets/fonts/materialdesignicons-webfont-7.4.47.ttf"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include guition-esp32-p4-jc1060p470.yaml

esphome:
  project:
    name: jtenniswood.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://jtenniswood/espcontrol/devices/guition-esp32-p4-jc1060p470/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/guition-esp32-p4-jc1060p470/www.js"
