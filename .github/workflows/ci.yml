name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/nightly-firmware.yml'
      - '.github/workflows/release.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ESPCONTROL_NPM_CACHE_MAX_MB: 512

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-icons:
    name: Sync Generated Icons
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - name: Generate icon outputs
        run: python3 scripts/build.py icons

      - name: Commit generated icon outputs
        id: commit
        run: |
          if git diff --quiet -- \
            common/assets/icon_glyphs.yaml \
            components/espcontrol/icons.h \
            src/webserver/www.js; then
            echo "Generated icon files are already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            common/assets/icon_glyphs.yaml \
            components/espcontrol/icons.h \
            src/webserver/www.js
          git commit -m "Build generated icon files"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate Generated Files
    needs: sync-icons
    if: >-
      always() &&
      (github.event_name == 'pull_request' || needs.sync-icons.outputs.changed != 'true')
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - run: npm run check:ci

  docs:
    name: Build Docs
    needs: [sync-icons, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      (github.event_name == 'pull_request' || needs.sync-icons.outputs.changed != 'true')
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - run: npm run docs:build

  ci-gate:
    name: CI Gate
    needs: [validate, docs]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CI jobs passed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] ||
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "::error::Required CI jobs did not pass."
            echo "Validate Generated Files: ${{ needs.validate.result }}"
            echo "Build Docs: ${{ needs.docs.result }}"
            exit 1
          fi
