name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'devices/manifest.json'
      - 'scripts/check_public_firmware.py'
      - 'scripts/prune_actions_cache.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ESPCONTROL_NPM_CACHE_MAX_MB: 512

jobs:
  build-docs:
    name: Build Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v7.0.0
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/.vitepress/dist

  download-firmware:
    name: Download Firmware
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v7.0.0
        with:
          sparse-checkout: devices/manifest.json
          sparse-checkout-cone-mode: false

      - name: Set device slugs
        run: |
          DEVICE_SLUGS=$(jq -r '.devices | keys | join(" ")' devices/manifest.json)
          echo "DEVICE_SLUGS=${DEVICE_SLUGS}" >> "$GITHUB_ENV"

      - name: Download firmware from stable releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASES_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=30")
          STABLE_RELEASES_JSON=$(printf '%s' "${RELEASES_JSON}" | jq -c '[.[] | select((.draft | not) and (.prerelease | not))][0:5]')
          RELEASE_COUNT=$(printf '%s' "${STABLE_RELEASES_JSON}" | jq 'length')

          if [ "${RELEASE_COUNT}" -eq 0 ]; then
            echo "::warning::No stable firmware releases found"
            exit 0
          fi

          download_asset() {
            RELEASE_JSON="$1"
            ASSET_NAME="$2"
            OUTPUT_PATH="$3"
            ASSET_URL=$(printf '%s' "${RELEASE_JSON}" | jq -r --arg name "${ASSET_NAME}" \
              '.assets[]? | select(.name == $name) | .url' | head -n 1)
            if [ -z "${ASSET_URL}" ]; then
              return 1
            fi
            mkdir -p "$(dirname "${OUTPUT_PATH}")"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "${ASSET_URL}" \
              -o "${OUTPUT_PATH}"
          }

          ota_md5() {
            MANIFEST_PATH="$1"
            jq -r --arg path "$2" \
              'first((.builds // [])[]?.ota | select((.path // "") == $path) | (.md5 // "")) // ""' \
              "${MANIFEST_PATH}"
          }

          ota_release_url() {
            MANIFEST_PATH="$1"
            jq -r --arg path "$2" \
              'first((.builds // [])[]?.ota | select((.path // "") == $path) | (.release_url // "")) // ""' \
              "${MANIFEST_PATH}"
          }

          for SLUG in $DEVICE_SLUGS; do
            mkdir -p "firmware/${SLUG}"
            INDEX_ENTRIES=$(mktemp)
            HAVE_CURRENT=false
            : > "${INDEX_ENTRIES}"

            for IDX in $(seq 0 $((RELEASE_COUNT - 1))); do
              RELEASE_JSON=$(printf '%s' "${STABLE_RELEASES_JSON}" | jq -c ".[$IDX]")
              RELEASE_TAG=$(printf '%s' "${RELEASE_JSON}" | jq -r '.tag_name')
              RELEASE_HTML_URL=$(printf '%s' "${RELEASE_JSON}" | jq -r '.html_url')
              MANIFEST_TMP=$(mktemp)

              if ! download_asset "${RELEASE_JSON}" "${SLUG}.manifest.json" "${MANIFEST_TMP}"; then
                continue
              fi

              VERSION=$(jq -r '.version // ""' "${MANIFEST_TMP}")
              if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
                VERSION="${RELEASE_TAG}"
              fi
              VERSION_PATH=$(printf '%s' "${VERSION}" | sed 's/[^A-Za-z0-9._-]/_/g')

              if [ "${HAVE_CURRENT}" = false ]; then
                OTA_OUTPUT="firmware/${SLUG}/${SLUG}.ota.bin"
                OTA_INDEX_PATH="${SLUG}.ota.bin"
              else
                OTA_OUTPUT="firmware/${SLUG}/versions/${VERSION_PATH}/${SLUG}.ota.bin"
                OTA_INDEX_PATH="versions/${VERSION_PATH}/${SLUG}.ota.bin"
              fi

              if ! download_asset "${RELEASE_JSON}" "${SLUG}.ota.bin" "${OTA_OUTPUT}"; then
                continue
              fi

              if [ "${HAVE_CURRENT}" = false ]; then
                cp "${MANIFEST_TMP}" "firmware/${SLUG}/manifest.json"
                download_asset "${RELEASE_JSON}" "${SLUG}.factory.bin" "firmware/${SLUG}/${SLUG}.factory.bin" || true
                HAVE_CURRENT=true
              fi

              OTA_MD5=$(ota_md5 "${MANIFEST_TMP}" "${SLUG}.ota.bin")
              if [ -z "${OTA_MD5}" ]; then
                echo "::warning::${SLUG} ${VERSION} manifest does not include an OTA md5"
                continue
              fi
              ENTRY_RELEASE_URL=$(ota_release_url "${MANIFEST_TMP}" "${SLUG}.ota.bin")
              if [ -z "${ENTRY_RELEASE_URL}" ]; then
                ENTRY_RELEASE_URL="${RELEASE_HTML_URL}"
              fi

              jq -n \
                --arg version "${VERSION}" \
                --arg release_url "${ENTRY_RELEASE_URL}" \
                --arg ota_path "${OTA_INDEX_PATH}" \
                --arg ota_md5 "${OTA_MD5}" \
                '{version:$version, release_url:$release_url, ota:{path:$ota_path, md5:$ota_md5}}' \
                >> "${INDEX_ENTRIES}"
            done

            if [ -s "${INDEX_ENTRIES}" ]; then
              jq -s --arg device "${SLUG}" '{device:$device, versions:.}' \
                "${INDEX_ENTRIES}" > "firmware/${SLUG}/versions.json"
            fi
          done

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASES_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=20")
          BETA_ASSETS=$(printf '%s' "${RELEASES_JSON}" | jq -c '[.[] | select(.prerelease)][0].assets // []')

          if [ "${BETA_ASSETS}" != "[]" ]; then
            download_beta_asset() {
              ASSET_NAME="$1"
              OUTPUT_PATH="$2"
              ASSET_URL=$(printf '%s' "${BETA_ASSETS}" | jq -r --arg name "${ASSET_NAME}" \
                '.[] | select(.name == $name) | .url' | head -n 1)
              if [ -z "${ASSET_URL}" ]; then
                return 0
              fi
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/octet-stream" \
                "${ASSET_URL}" \
                -o "${OUTPUT_PATH}"
            }

            for SLUG in $DEVICE_SLUGS; do
              (
                mkdir -p "firmware/${SLUG}/beta"
                download_beta_asset "${SLUG}.manifest.json" "firmware/${SLUG}/beta/manifest.json"
                download_beta_asset "${SLUG}.ota.bin" "firmware/${SLUG}/beta/${SLUG}.ota.bin"
              ) &
            done
            wait
          fi

      - name: Verify firmware assets
        run: |
          MISSING=false
          OPTIONAL_FIRMWARE_SLUGS="guition-esp32-p4-jc8012p4a1 guition-esp32-p4-jc8012p4a1-v2 esp32-p4-86"
          for SLUG in $DEVICE_SLUGS; do
            MANIFEST="firmware/${SLUG}/manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              if echo " ${OPTIONAL_FIRMWARE_SLUGS} " | grep -q " ${SLUG} "; then
                echo "::warning::No firmware manifest found for ${SLUG} yet — install button will work after the first release asset is published"
              else
                echo "::error::No firmware manifest found for ${SLUG} — install page will be non-functional"
                MISSING=true
              fi
            fi
          done
          if [ "$MISSING" = true ]; then exit 1; fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: firmware/

  deploy:
    name: Deploy to Pages
    needs: [build-docs, download-firmware]
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          sparse-checkout: |
            devices/manifest.json
            scripts/check_public_firmware.py
          sparse-checkout-cone-mode: false

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: dist

      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: firmware
          path: dist/firmware

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify public firmware assets
        run: >-
          python3 scripts/check_public_firmware.py
          --base-url "${{ steps.deployment.outputs.page_url }}"
          --manifest devices/manifest.json
          --optional-stable-slugs guition-esp32-p4-jc8012p4a1 guition-esp32-p4-jc8012p4a1-v2 esp32-p4-86
          --retries 5
          --delay 20
